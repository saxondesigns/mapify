<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapify</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #00ca4e;
            --bg-dark: #121212;
            --panel-dark: #1e1e1e;
            --sidebar-width: 240px;
            --discord-blue: #5865F2;
            --youtube-red: #FF0000;
        }

        body { font-family: 'Poppins', sans-serif; background: var(--bg-dark); color: #e0e0e0; margin: 0; display: flex; min-height: 100vh; }

        #sidebar { width: var(--sidebar-width); background: var(--panel-dark); border-right: 1px solid #333; display: flex; flex-direction: column; padding: 30px 20px; box-sizing: border-box; }
        .sidebar-header { font-size: 1.8rem; color: var(--primary); margin-bottom: 2.5rem; letter-spacing: -1px; }

        .nav-link { 
            display: flex; align-items: center; padding: 12px 15px; color: #ccc; text-decoration: none; border-radius: 8px; transition: all 0.3s ease; margin-bottom: 15px; background: #262626; font-size: 0.95rem; gap: 12px; border: 1px solid transparent;
        }
        .nav-link.discord:hover { border-color: var(--discord-blue); box-shadow: 0 0 20px rgba(88, 101, 242, 0.4); transform: translateY(-2px); color: white; }
        .nav-link.youtube:hover { border-color: var(--youtube-red); box-shadow: 0 0 20px rgba(255, 0, 0, 0.4); transform: translateY(-2px); color: white; }

        #main-content { flex-grow: 1; display: flex; align-items: center; justify-content: center; padding: 40px; }
        .container { background: var(--panel-dark); padding: 2.5rem; border-radius: 16px; box-shadow: 0 15px 35px rgba(0,0,0,0.6); max-width: 850px; width: 100%; text-align: center; border: 1px solid #333; }

        h1 { color: var(--primary); margin-bottom: 0.5rem; font-size: 3rem; letter-spacing: -1px; }
        
        .controls { margin-bottom: 2rem; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        
        .search-container { position: relative; width: 100%; }
        .search-label { font-size: 0.7rem; color: #777; text-transform: uppercase; margin-bottom: 5px; display: block; text-align: left; }
        
        /* Shared Dropdown Style */
        .dropdown-box { 
            display: flex; align-items: center; gap: 12px;
            width: 100%; padding: 10px 14px; border-radius: 8px; 
            border: 1px solid #444; background: #2d2d2d; color: white; 
            box-sizing: border-box; cursor: pointer; min-height: 52px;
        }
        .dropdown-box img { width: 32px; height: 32px; border: 1px solid #555; display: none; object-fit: cover; }
        
        .search-input { width: 100%; background: transparent; border: none; color: white; outline: none; font-family: 'Poppins'; font-size: 0.9rem; }

        .results-list { 
            position: absolute; top: 100%; left: 0; right: 0; 
            background: #2d2d2d; border: 1px solid #444; border-radius: 0 0 8px 8px; 
            max-height: 250px; overflow-y: auto; z-index: 100; display: none;
        }

        .item-row { 
            display: flex; align-items: center; padding: 10px; gap: 12px; 
            border-bottom: 1px solid #333; cursor: pointer; transition: 0.1s; text-align: left;
        }
        .item-row:hover { background: #3d3d3d; }
        .item-row img { width: 30px; height: 20px; object-fit: cover; border: 1px solid #555; background: #000; }

        #canvas-container { margin-top: 10px; border-radius: 12px; background-color: #1a1a1a; display: inline-block; position: relative; border: 2px dashed #444; }
        #canvas-container.loaded { border: 2px solid transparent; }
        canvas { max-width: 100%; height: auto; display: block; }
        
        button#download-btn { background: var(--primary); border: none; padding: 14px 28px; color: white; cursor: pointer; border-radius: 8px; font-weight: bold; font-size: 1.1rem; margin-top: 2rem; display: none; }
        .version-tag { position: fixed; bottom: 15px; right: 20px; font-size: 0.75rem; color: rgba(255, 255, 255, 0.3); pointer-events: none; }

        @media (max-width: 600px) { .controls { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<aside id="sidebar">
    <div class="sidebar-header">Mapify</div>
    <a href="https://discord.gg/kdFCt93SWe" target="_blank" class="nav-link discord"><i class="fab fa-discord"></i> Discord</a>
    <a href="https://youtube.com/@SaxonMapper" target="_blank" class="nav-link youtube"><i class="fab fa-youtube"></i> YouTube</a>
</aside>

<main id="main-content">
    <div class="container">
        <h1>Mapify</h1>
        <div class="controls">
            <!-- PRESETS -->
            <div class="search-container">
                <span class="search-label">Mapper Presets</span>
                <div class="dropdown-box" id="preset-display">
                    <img id="p-logo" src="" alt="">
                    <span id="p-name">Select Preset...</span>
                </div>
                <div class="results-list" id="p-results"></div>
            </div>

            <!-- FLAG SEARCH -->
            <div class="search-container">
                <span class="search-label">Search World Flags</span>
                <div class="dropdown-box">
                    <img id="f-logo" src="" alt="">
                    <input type="text" id="f-input" class="search-input" placeholder="Type country...">
                </div>
                <div class="results-list" id="f-results"></div>
            </div>
        </div>

        <input type="file" id="upload" accept="image/*" style="background: #2d2d2d; padding: 10px; border-radius: 8px; border: 1px solid #444; color: white; cursor: pointer; width: 100%; max-width: 300px; margin-bottom: 20px;">

        <div id="canvas-container">
            <canvas id="mainCanvas"></canvas>
        </div>
        <br>
        <button id="download-btn">Download Map</button>
    </div>
</main>

<div class="version-tag">Mapify v2.5.2</div>

<script>
    const canvas = document.getElementById('mainCanvas');
    const ctx = canvas.getContext('2d');
    const downloadBtn = document.getElementById('download-btn');
    const canvasContainer = document.getElementById('canvas-container');

    let activeTexture = new Image();
    let shadowSettings = { blur: 18, ox: 7.07, oy: 7.07 };

    const presets = [
        { name: "ITAE", handle: "ImThat-AustrianEmpire", texture: "grunge.png", s: { blur: 18, ox: 7.07, oy: 7.07 } },
        { name: "Willdude", handle: "WILLDUDE1", texture: "grunge2.png", s: { blur: 18, ox: 7.07, oy: 7.07 } },
        { name: "KT", handle: "knowledgetech_21", texture: "grunge3.png", s: { blur: 18, ox: 5.66, oy: 5.66 } }
    ];

    // Preset Logic
    const pDisplay = document.getElementById('preset-display');
    const pResults = document.getElementById('p-results');
    pDisplay.onclick = () => pResults.style.display = pResults.style.display === 'block' ? 'none' : 'block';

    presets.forEach(p => {
        const div = document.createElement('div');
        div.className = 'item-row';
        const logo = `https://unavatar.io/youtube/${p.handle}`;
        div.innerHTML = `<img src="${logo}" style="border-radius: 50%"><span>${p.name}</span>`;
        div.onclick = () => {
            activeTexture.src = p.texture;
            shadowSettings = p.s;
            document.getElementById('p-logo').src = logo;
            document.getElementById('p-logo').style.display = 'block';
            document.getElementById('p-name').innerText = p.name;
            pResults.style.display = 'none';
        };
        pResults.appendChild(div);
    });

    // Flag Search Logic
    const fInput = document.getElementById('f-input');
    const fResults = document.getElementById('f-results');

    fInput.oninput = async () => {
        const query = fInput.value.trim();
        if (query.length < 2) { fResults.style.display = 'none'; return; }
        
        try {
            const res = await fetch(`https://restcountries.com/v3.1/name/${query}`);
            const data = await res.json();
            fResults.innerHTML = '';
            if (data.status === 404) return;

            data.slice(0, 8).forEach(country => {
                const div = document.createElement('div');
                div.className = 'item-row';
                div.innerHTML = `<img src="${country.flags.png}"><span>${country.name.common}</span>`;
                div.onclick = () => {
                    const img = new Image();
                    img.crossOrigin = "Anonymous";
                    img.onload = () => processImage(img);
                    img.src = country.flags.png;
                    
                    document.getElementById('f-logo').src = country.flags.png;
                    document.getElementById('f-logo').style.display = 'block';
                    fInput.value = country.name.common;
                    fResults.style.display = 'none';
                };
                fResults.appendChild(div);
            });
            fResults.style.display = 'block';
        } catch (e) { console.log("API Error"); }
    };

    document.getElementById('upload').addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
            const img = new Image();
            img.onload = () => processImage(img);
            img.src = event.target.result;
        };
        reader.readAsDataURL(file);
    });

    function processImage(img) {
        canvasContainer.classList.add('loaded');
        canvas.width = img.width;
        canvas.height = img.height;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        ctx.shadowBlur = shadowSettings.blur;
        ctx.shadowOffsetX = shadowSettings.ox;
        ctx.shadowOffsetY = shadowSettings.oy;
        ctx.shadowColor = "rgba(0, 0, 0, 0.70)";
        ctx.drawImage(img, 0, 0);
        ctx.shadowColor = "transparent";

        ctx.save();
        ctx.globalAlpha = 0.60;
        ctx.globalCompositeOperation = 'source-atop';
        ctx.drawImage(activeTexture, 0, 0, canvas.width, canvas.height);
        ctx.restore();

        downloadBtn.style.display = 'inline-block';
    }

    window.onclick = (e) => {
        if (!pDisplay.contains(e.target)) pResults.style.display = 'none';
        if (!fInput.contains(e.target)) fResults.style.display = 'none';
    };

    downloadBtn.onclick = () => {
        const link = document.createElement('a');
        link.download = `mapify_export.png`;
        link.href = canvas.toDataURL("image/png");
        link.click();
    };
</script>
</body>
</html>
