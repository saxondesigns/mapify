<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapify</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700&display=swap" rel="stylesheet">
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #00ca4e;
            --bg-dark: #121212;
            --panel-dark: #1e1e1e;
            --sidebar-width: 240px;
        }

        body { 
            font-family: 'Poppins', sans-serif; 
            background: var(--bg-dark); 
            color: #e0e0e0; 
            margin: 0; 
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar */
        #sidebar {
            width: var(--sidebar-width);
            background: var(--panel-dark);
            border-right: 1px solid #333;
            display: flex;
            flex-direction: column;
            padding: 30px 20px;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        .sidebar-header {
            font-size: 1.8rem;
            color: var(--primary);
            margin-bottom: 2.5rem;
            letter-spacing: -1px;
        }

        .nav-link {
            display: flex;
            align-items: center;
            padding: 12px 15px;
            color: #ccc;
            text-decoration: none;
            border-radius: 8px;
            transition: 0.2s;
            margin-bottom: 15px;
            background: #262626;
            font-size: 0.95rem;
            gap: 12px; /* Space between icon and text */
        }

        .nav-link i {
            font-size: 1.2rem;
            width: 20px;
            text-align: center;
        }

        .nav-link:hover {
            background: #333;
            color: var(--primary);
            transform: translateX(5px);
        }

        .fa-youtube { color: #ff0000; }
        .fa-discord { color: #5865F2; }

        /* Main Area */
        #main-content {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }

        .container { 
            background: var(--panel-dark); 
            padding: 2.5rem; 
            border-radius: 16px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.6); 
            max-width: 800px; 
            width: 100%; 
            text-align: center; 
            border: 1px solid #333; 
        }

        h1 { color: var(--primary); margin-bottom: 0.5rem; margin-top: 0; font-size: 3rem; letter-spacing: -1px; }
        p.subtitle { font-family: sans-serif; color: #aaa; margin-bottom: 2rem; font-size: 0.9rem; font-weight: normal; }
        
        .controls { margin-bottom: 2rem; display: flex; flex-direction: column; align-items: center; gap: 10px; }
        input[type="file"] { background: #2d2d2d; padding: 12px; border-radius: 8px; border: 1px solid #444; color: white; cursor: pointer; width: 100%; max-width: 300px; }
        
        #canvas-container { margin-top: 10px; border: 2px dashed #444; border-radius: 12px; background-color: #1a1a1a; display: inline-block; }
        canvas { max-width: 100%; height: auto; display: block; }
        
        button#download-btn { background: var(--primary); border: none; padding: 14px 28px; color: white; cursor: pointer; border-radius: 8px; font-weight: bold; font-size: 1.1rem; margin-top: 2rem; display: none; transition: 0.2s; }
        button#download-btn:hover { background: #00ab42; transform: scale(1.05); }

        @media (max-width: 768px) {
            body { flex-direction: column; }
            #sidebar { width: 100%; border-right: none; border-bottom: 1px solid #333; padding: 20px; flex-direction: row; justify-content: space-around; align-items: center; }
            .sidebar-header { margin-bottom: 0; font-size: 1.4rem; }
            .nav-link { margin-bottom: 0; }
            #main-content { padding: 20px; }
        }
    </style>
</head>
<body>

<aside id="sidebar">
    <div class="sidebar-header">Mapify</div>
    <a href="https://discord.gg/kdFCt93SWe" target="_blank" class="nav-link">
        <i class="fab fa-discord"></i> Discord
    </a>
    <a href="https://youtube.com/@SaxonMapper" target="_blank" class="nav-link">
        <i class="fab fa-youtube"></i> YouTube
    </a>
</aside>

<main id="main-content">
    <div class="container">
        <h1>Mapify</h1>
        <p class="subtitle">The ultimate geocontent creation tool.</p>
        <div class="controls">
            <input type="file" id="upload" accept="image/*">
        </div>
        <div id="canvas-container">
            <canvas id="mainCanvas"></canvas>
        </div>
        <button id="download-btn">Download Map</button>
    </div>
</main>

<script>
    const upload = document.getElementById('upload');
    const canvas = document.getElementById('mainCanvas');
    const ctx = canvas.getContext('2d');
    const downloadBtn = document.getElementById('download-btn');
    const texture = new Image();
    texture.src = 'grunge.png';

    upload.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
            const img = new Image();
            img.onload = () => {
                canvas.width = img.width;
                canvas.height = img.height;
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                const tempCanvas = document.createElement('canvas');
                const tCtx = tempCanvas.getContext('2d');
                tempCanvas.width = img.width;
                tempCanvas.height = img.height;
                tCtx.drawImage(img, 0, 0);
                
                const imageData = tCtx.getImageData(0, 0, canvas.width, canvas.height);
                const pixels = imageData.data;
                const visited = new Uint8Array(canvas.width * canvas.height);
                const islands = [];

                for (let i = 0; i < pixels.length; i += 4) {
                    const idx = i / 4;
                    if (pixels[i + 3] > 10 && !visited[idx]) {
                        const island = findIsland(idx, pixels, visited, canvas.width, canvas.height);
                        if (island.pixels.length > 50) islands.push(island);
                    }
                }

                ctx.shadowBlur = 18;
                ctx.shadowOffsetX = 7.07;
                ctx.shadowOffsetY = 7.07;
                ctx.shadowColor = "rgba(0, 0, 0, 0.70)";
                ctx.drawImage(img, 0, 0);
                ctx.shadowColor = "transparent";

                islands.forEach(island => {
                    ctx.save();
                    const path = new Path2D();
                    island.pixels.forEach(p => {
                        const x = p % canvas.width;
                        const y = Math.floor(p / canvas.width);
                        path.rect(x, y, 1, 1);
                    });
                    ctx.clip(path);
                    ctx.globalAlpha = 0.60;
                    ctx.globalCompositeOperation = 'source-atop';
                    ctx.drawImage(texture, island.minX, island.minY, island.maxX - island.minX, island.maxY - island.minY);
                    ctx.restore();
                });

                downloadBtn.style.display = 'inline-block';
            };
            img.src = event.target.result;
        };
        reader.readAsDataURL(file);
    });

    function findIsland(startIdx, pixels, visited, width, height) {
        const stack = [startIdx];
        const islandPixels = [];
        let minX = startIdx % width, maxX = minX;
        let minY = Math.floor(startIdx / width), maxY = minY;
        visited[startIdx] = 1;

        while (stack.length > 0) {
            const curr = stack.pop();
            islandPixels.push(curr);
            const x = curr % width;
            const y = Math.floor(curr / width);

            minX = Math.min(minX, x); maxX = Math.max(maxX, x);
            minY = Math.min(minY, y); maxY = Math.max(maxY, y);

            const neighbors = [curr - 1, curr + 1, curr - width, curr + width];
            neighbors.forEach(n => {
                if (n >= 0 && n < visited.length && !visited[n] && pixels[n * 4 + 3] > 10) {
                    const nx = n % width;
                    if (Math.abs(nx - x) <= 1) {
                        visited[n] = 1;
                        stack.push(n);
                    }
                }
            });
        }
        return { pixels: islandPixels, minX, maxX, minY, maxY };
    }

    downloadBtn.addEventListener('click', () => {
        const link = document.createElement('a');
        link.download = 'mapify_export.png';
        link.href = canvas.toDataURL("image/png");
        link.click();
    });
</script>
</body>
</html>
