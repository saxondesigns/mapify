<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapify</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@400;600;700&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --primary: #00ca4e;
            --apple-bg: #000000;
            --apple-card: #1c1c1e;
            --apple-text: #ffffff;
            --apple-secondary: #8e8e93;
            --apple-border: rgba(255, 255, 255, 0.1);
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        html { scroll-behavior: smooth; }

        body { 
            font-family: 'SF Pro Display', 'Poppins', -apple-system, sans-serif; 
            background: var(--apple-bg); 
            background-image: 
                radial-gradient(circle at 50% 50%, rgba(0, 202, 78, 0.08) 0%, transparent 50%),
                linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 100% 100%, 50px 50px, 50px 50px;
            color: var(--apple-text); 
            margin: 0; 
            display: flex; 
            min-height: 100vh;
        }

        /* Sidebar */
        #sidebar { 
            width: 80px; 
            background: rgba(28, 28, 30, 0.85); 
            backdrop-filter: blur(25px);
            border-right: 1px solid var(--apple-border); 
            display: flex; 
            flex-direction: column; 
            align-items: center;
            padding: 30px 0; 
            position: fixed; 
            height: 100vh; 
            z-index: 1000;
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        #sidebar:hover { width: 220px; }
        .sidebar-header { font-size: 1.5rem; color: var(--primary); margin-bottom: 3rem; }
        .nav-link { 
            display: flex; align-items: center; justify-content: center; width: 50px; height: 50px; 
            color: var(--apple-text); text-decoration: none; border-radius: 12px; 
            margin-bottom: 15px; background: transparent; font-size: 1.2rem; gap: 15px;
            transition: all 0.3s ease;
            overflow: hidden;
        }
        .nav-link span { display: none; font-size: 0.9rem; font-weight: 600; white-space: nowrap; }
        #sidebar:hover .nav-link { width: 180px; justify-content: flex-start; padding-left: 20px; }
        #sidebar:hover .nav-link span { display: block; }
        .nav-link:hover { background: rgba(255, 255, 255, 0.1); transform: scale(1.05); color: var(--primary); }

        /* Main Layout */
        #main-wrapper { 
            margin-left: 80px; 
            flex-grow: 1; 
            padding: 80px 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            width: calc(100% - 80px); 
        }
        
        .container { 
            background: rgba(28, 28, 30, 0.7); 
            backdrop-filter: blur(20px);
            padding: 4rem; 
            border-radius: 32px; 
            box-shadow: 0 30px 60px rgba(0,0,0,0.6); 
            max-width: 800px; 
            width: 100%; 
            text-align: center; 
            border: 1px solid var(--apple-border);
            margin-bottom: 120px; 
            animation: fadeInUp 0.8s ease-out;
        }

        h1 { color: var(--apple-text); margin-bottom: 10px; font-size: 4rem; letter-spacing: -2px; font-weight: 800; }
        .tagline { color: var(--apple-secondary); font-size: 1.2rem; font-weight: 500; margin-bottom: 3rem; }

        /* Watermark Lab */
        .lab-section {
            background: rgba(44, 44, 46, 0.5);
            border-radius: 20px;
            padding: 25px;
            margin-top: 30px;
            text-align: left;
            border: 1px solid var(--apple-border);
        }
        .lab-header { font-weight: 700; color: var(--primary); margin-bottom: 15px; display: flex; align-items: center; gap: 10px; }
        .lab-input { 
            width: 100%; padding: 10px; background: #1c1c1e; border: 1px solid var(--apple-border); 
            border-radius: 8px; color: white; outline: none; box-sizing: border-box; margin-bottom: 10px;
        }
        .lab-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .control-group label { display: block; font-size: 0.8rem; color: var(--apple-secondary); margin-bottom: 5px; }

        /* Canvas & Controls */
        #canvas-container { 
            margin: 40px auto; border-radius: 24px; background: #121212; padding: 15px;
            box-shadow: 0 0 0 1px var(--apple-border), 0 20px 40px rgba(0,0,0,0.4);
            max-width: 90%;
        }
        canvas { border-radius: 14px; max-width: 100%; height: auto; display: block; margin: 0 auto; }
        
        button#download-btn { 
            background: var(--primary); border: none; padding: 18px 40px; color: white; 
            cursor: pointer; border-radius: 35px; font-weight: 700; font-size: 1rem;
            transition: transform 0.2s, background 0.3s; display: none; margin: 20px auto 0;
        }
        button#download-btn:hover { background: #00b345; transform: scale(1.05); }

        /* Global Assets Section */
        .section-container { max-width: 1200px; width: 100%; text-align: center; margin-bottom: 120px; }
        .section-header { font-size: 3rem; color: var(--apple-text); margin-bottom: 40px; font-weight: 800; }
        .flag-search-bar {
            width: 100%; max-width: 600px; padding: 20px 30px;
            background: rgba(28, 28, 30, 0.8); border: 1px solid var(--apple-border); border-radius: 20px;
            color: var(--apple-text); font-family: inherit; text-align: center; font-size: 1.1rem;
        }
        #flag-results { 
            position: absolute; width: 100%; background: #2c2c2e; border-radius: 16px; 
            top: calc(100% + 10px); z-index: 100; box-shadow: 0 20px 40px rgba(0,0,0,0.4); 
            display: none; text-align: left; max-height: 400px; overflow-y: auto;
        }
        .channel-item { display: flex; align-items: center; padding: 14px 20px; gap: 15px; cursor: pointer; border-bottom: 1px solid var(--apple-border); color: var(--apple-text); transition: background 0.2s; }
        .channel-item:hover { background: #3a3a3c; }

        .version-tag { position: fixed; bottom: 20px; right: 30px; font-size: 0.8rem; color: var(--apple-secondary); opacity: 0.6; }

        @media (max-width: 768px) {
            #sidebar { bottom: 0; height: 70px; width: 100vw; flex-direction: row; border-right: none; border-top: 1px solid var(--apple-border); padding: 0; justify-content: space-around; }
            #main-wrapper { margin-left: 0; width: 100%; padding: 40px 15px 120px; }
            h1 { font-size: 2.8rem; }
        }
    </style>
</head>
<body>

<aside id="sidebar">
    <div class="sidebar-header"><i class="fa-solid fa-map-location-dot"></i></div>
    <a href="#" class="nav-link"><i class="fa-solid fa-house"></i><span>Home</span></a>
    <a href="#lab" class="nav-link"><i class="fa-solid fa-signature"></i><span>Watermark Lab</span></a>
    <a href="#flags-anchor" class="nav-link"><i class="fa-solid fa-flag"></i><span>Assets</span></a>
    <a href="https://youtube.com/@SaxonMapper" target="_blank" class="nav-link"><i class="fa-brands fa-youtube"></i><span>YouTube</span></a>
</aside>

<div id="main-wrapper">
    <div class="container">
        <h1>Mapify</h1>
        <p class="tagline">Professional flag maps in seconds.</p>
        
        <div class="controls">
            <input type="file" id="upload" accept="image/*" style="display: none;">
            <label for="upload" style="cursor: pointer; color: var(--primary); font-weight: 700; font-size: 1.1rem; border: 2px solid var(--primary); padding: 10px 20px; border-radius: 12px;">
                <i class="fa-solid fa-cloud-arrow-up" style="margin-right: 8px;"></i>Upload Base Map
            </label>
        </div>

        <!-- Watermark Lab Restored -->
        <div id="lab" class="lab-section">
            <div class="lab-header"><i class="fa-solid fa-vial"></i> Watermark Lab</div>
            <div class="control-group">
                <label>Watermark Text</label>
                <input type="text" id="wm-text" class="lab-input" placeholder="e.g. @SaxonMapper">
            </div>
            <div class="lab-grid">
                <div class="control-group">
                    <label>Opacity (%)</label>
                    <input type="number" id="wm-opacity" class="lab-input" value="50" min="0" max="100">
                </div>
                <div class="control-group">
                    <label>Font Size (px)</label>
                    <input type="number" id="wm-size" class="lab-input" value="40">
                </div>
            </div>
            <div class="lab-grid">
                <div class="control-group">
                    <label>X Offset (px)</label>
                    <input type="number" id="wm-x" class="lab-input" value="20">
                </div>
                <div class="control-group">
                    <label>Y Offset (px)</label>
                    <input type="number" id="wm-y" class="lab-input" value="20">
                </div>
            </div>
        </div>

        <div id="canvas-container">
            <canvas id="mainCanvas"></canvas>
            <button id="download-btn">Save Image</button>
        </div>
    </div>

    <!-- Assets Section -->
    <div id="flags-anchor"></div>
    <section class="section-container">
        <h2 class="section-header">Global Asset Library</h2>
        <div style="display: flex; justify-content: center; position: relative;">
            <input type="text" id="flag-search" class="flag-search-bar" placeholder="Search modern or historical flags...">
            <div id="flag-results"></div>
        </div>
    </section>
</div>

<div class="version-tag">Mapify v2.8.5</div>

<script>
    const canvas = document.getElementById('mainCanvas');
    const ctx = canvas.getContext('2d');
    const downloadBtn = document.getElementById('download-btn');
    const flagSearchInput = document.getElementById('flag-search');
    const flagResults = document.getElementById('flag-results');
    
    // Lab Inputs
    const wmInputs = [
        document.getElementById('wm-text'),
        document.getElementById('wm-opacity'),
        document.getElementById('wm-size'),
        document.getElementById('wm-x'),
        document.getElementById('wm-y')
    ];

    let currentBaseImage = null;
    let allCountries = [];

    async function init() {
        try {
            const res = await fetch('https://flagcdn.com/en/codes.json');
            const data = await res.json();
            allCountries = Object.entries(data).map(([code, name]) => ({ name, code }));
        } catch (e) {}
    }

    function render() {
        if (!currentBaseImage) return;
        canvas.width = currentBaseImage.width;
        canvas.height = currentBaseImage.height;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(currentBaseImage, 0, 0);
        
        const text = wmInputs[0].value;
        if (text) {
            ctx.save();
            ctx.globalAlpha = wmInputs[1].value / 100;
            ctx.font = `bold ${wmInputs[2].value}px 'Poppins'`;
            ctx.fillStyle = "white";
            ctx.textAlign = "left";
            ctx.textBaseline = "bottom";
            ctx.fillText(text, parseInt(wmInputs[3].value), canvas.height - parseInt(wmInputs[4].value));
            ctx.restore();
        }
        downloadBtn.style.display = 'block';
    }

    wmInputs.forEach(el => el.addEventListener('input', render));

    flagSearchInput.oninput = async () => {
        const query = flagSearchInput.value.toLowerCase();
        if (query.length < 2) { flagResults.style.display = 'none'; return; }
        flagResults.innerHTML = '';
        flagResults.style.display = 'block';

        allCountries.filter(c => c.name.toLowerCase().includes(query)).slice(0, 5).forEach(c => {
            const div = document.createElement('div');
            div.className = 'channel-item';
            div.innerHTML = `<img src="https://flagcdn.com/w40/${c.code}.png" style="width:24px"><span>${c.name}</span>`;
            div.onclick = () => loadImg(`https://flagcdn.com/w640/${c.code}.png`);
            flagResults.appendChild(div);
        });
    };

    function loadImg(url) {
        const img = new Image();
        img.crossOrigin = "anonymous";
        img.onload = () => { currentBaseImage = img; render(); flagResults.style.display = 'none'; };
        img.src = url;
    }

    document.getElementById('upload').onchange = (e) => {
        const reader = new FileReader();
        reader.onload = (event) => loadImg(event.target.result);
        reader.readAsDataURL(e.target.files[0]);
    };

    downloadBtn.onclick = () => {
        const link = document.createElement('a');
        link.download = 'mapify-v2.8.5.png';
        link.href = canvas.toDataURL();
        link.click();
    };

    init();
</script>
</body>
</html>
