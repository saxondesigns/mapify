<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapify</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@400;600;700&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --primary: #00ca4e;
            --apple-bg: #000000;
            --apple-card: #1c1c1e;
            --apple-text: #ffffff;
            --apple-secondary: #8e8e93;
            --apple-border: rgba(255, 255, 255, 0.1);
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes marching-ants {
            0% { stroke-dashoffset: 0; }
            100% { stroke-dashoffset: -20; }
        }

        html { scroll-behavior: smooth; }

        body { 
            font-family: 'SF Pro Display', 'Poppins', -apple-system, sans-serif; 
            background: var(--apple-bg); 
            background-image: 
                radial-gradient(circle at 50% 50%, rgba(0, 202, 78, 0.08) 0%, transparent 50%),
                linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 100% 100%, 50px 50px, 50px 50px;
            color: var(--apple-text); 
            margin: 0; 
            display: flex; 
            min-height: 100vh;
        }

        #sidebar { 
            width: 80px; 
            background: rgba(28, 28, 30, 0.85); 
            backdrop-filter: blur(25px);
            border-right: 1px solid var(--apple-border); 
            display: flex; 
            flex-direction: column; 
            align-items: center;
            padding: 30px 0; 
            position: fixed; 
            height: 100vh; 
            z-index: 1000;
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        #sidebar:hover { width: 220px; }
        .sidebar-header { font-size: 1.5rem; color: var(--primary); margin-bottom: 3rem; }

        .nav-link { 
            display: flex; align-items: center; justify-content: center; width: 50px; height: 50px; 
            color: var(--apple-text); text-decoration: none; border-radius: 12px; 
            margin-bottom: 15px; background: transparent; font-size: 1.2rem; gap: 15px;
            transition: all 0.3s ease; overflow: hidden;
        }
        .nav-link span { display: none; font-size: 0.9rem; font-weight: 600; white-space: nowrap; }
        #sidebar:hover .nav-link { width: 180px; justify-content: flex-start; padding-left: 20px; }
        #sidebar:hover .nav-link span { display: block; }
        .nav-link:hover { background: rgba(255, 255, 255, 0.1); color: var(--primary); }

        #main-wrapper { 
            margin-left: 80px; 
            flex-grow: 1; 
            padding: 80px 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            width: calc(100% - 80px); 
        }
        
        .container { 
            background: rgba(28, 28, 30, 0.7); 
            backdrop-filter: blur(20px);
            padding: 4rem; 
            border-radius: 32px; 
            box-shadow: 0 30px 60px rgba(0,0,0,0.6); 
            max-width: 800px; 
            width: 100%; 
            text-align: center; 
            border: 1px solid var(--apple-border);
            margin-bottom: 120px; 
            animation: fadeInUp 0.8s ease-out;
        }

        h1 { font-size: 4rem; letter-spacing: -2px; font-weight: 800; margin-bottom: 10px; }
        .tagline { color: var(--apple-secondary); font-size: 1.2rem; font-weight: 500; margin-bottom: 3rem; }

        .controls { display: flex; flex-direction: column; align-items: center; gap: 25px; margin-bottom: 3rem; width: 100%; }
        .search-container { width: 100%; max-width: 450px; position: relative; }

        #preset-display { 
            display: flex; align-items: center; justify-content: center; gap: 12px; width: 100%; 
            padding: 15px; border-radius: 16px; border: 1px solid var(--apple-border); 
            background: rgba(44, 44, 46, 0.8); color: var(--apple-text); cursor: pointer; 
            min-height: 56px; font-weight: 600; transition: all 0.3s ease;
        }

        .preset-hint { font-size: 0.85rem; color: var(--apple-secondary); margin-bottom: 10px; display: block; font-weight: 500; }

        #canvas-container { 
            margin: 40px auto; 
            position: relative;
            padding: 15px;
            border-radius: 24px;
            display: flex;
            justify-content: center;
        }

        .ants-border {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            fill: none;
            stroke: var(--primary);
            stroke-width: 3;
            stroke-dasharray: 10, 10;
            animation: marching-ants 0.5s infinite linear;
            pointer-events: none;
        }

        canvas { border-radius: 14px; max-width: 100%; height: auto; z-index: 5; }

        #download-btn { 
            background: var(--primary); border: none; padding: 18px 40px; color: white; 
            cursor: pointer; border-radius: 35px; font-weight: 700; display: none; margin: 20px auto 0;
        }

        .section-container { max-width: 1200px; width: 100%; text-align: center; margin-bottom: 120px; }
        .section-header { font-size: 3rem; color: var(--apple-text); margin-bottom: 40px; font-weight: 800; }
        
        .flag-search-bar {
            width: 100%; max-width: 600px; padding: 20px 30px;
            background: rgba(28, 28, 30, 0.8); border: 1px solid var(--apple-border); border-radius: 20px;
            color: var(--apple-text); font-family: inherit; outline: none; font-size: 1.1rem; text-align: center;
        }

        .testimonials-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 30px; width: 100%; padding: 0 20px; box-sizing: border-box; }
        .testimonial-card { 
            background: rgba(28, 28, 30, 0.5); backdrop-filter: blur(15px); padding: 35px; border-radius: 28px; 
            border: 1px solid var(--apple-border); text-align: left;
        }
        .t-pfp-container { width: 60px; height: 60px; margin-bottom: 20px; border-radius: 50%; overflow: hidden; border: 2px solid var(--apple-border); }
        .sub-count { font-size: 0.8rem; color: var(--primary); margin-bottom: 15px; font-weight: 700; }
    </style>
</head>
<body>

<aside id="sidebar">
    <div class="sidebar-header"><i class="fa-solid fa-map-location-dot"></i></div>
    <a href="https://discord.gg/kdFCt93SWe" target="_blank" class="nav-link"><i class="fa-brands fa-discord"></i><span>Discord</span></a>
    <a href="https://youtube.com/@SaxonMapper" target="_blank" class="nav-link"><i class="fa-brands fa-youtube"></i><span>YouTube</span></a>
    <a href="#flags-anchor" class="nav-link"><i class="fa-solid fa-flag"></i><span>Flags</span></a>
</aside>

<div id="main-wrapper">
    <div class="container">
        <h1>Mapify</h1>
        <p class="tagline">Professional flag maps in seconds.</p>
        
        <div class="controls">
            <div class="search-container">
                <span class="preset-hint">Select a preset from the top geotubers</span>
                <div id="preset-display">Choose Style Preset</div>
            </div>
            
            <div style="margin-top: 10px;">
                <input type="file" id="upload" accept="image/*" style="display: none;">
                <label for="upload" style="cursor: pointer; color: var(--primary); font-weight: 700; font-size: 1.1rem;">
                    <i class="fa-solid fa-cloud-arrow-up" style="margin-right: 8px;"></i>Upload Base Map
                </label>
            </div>
        </div>

        <div id="canvas-container">
            <svg class="ants-border" id="ants-svg">
                <rect x="0" y="0" width="100%" height="100%" rx="24" ry="24" />
            </svg>
            <canvas id="mainCanvas"></canvas>
            <button id="download-btn">Save Image</button>
        </div>
    </div>

    <!-- Reviews -->
    <section class="section-container">
        <h2 class="section-header">Community Verified</h2>
        <div class="testimonials-grid">
            <div class="testimonial-card">
                <div class="t-pfp-container"><img src="https://unavatar.io/youtube/ImThat-AustrianEmpire" style="width:100%"></div>
                <span class="t-name">@ImThatAustrian-Empire</span>
                <div class="sub-count">152K Subscribers</div>
                <p class="t-text">"Very Useful"</p>
            </div>
            <div class="testimonial-card">
                <div class="t-pfp-container"><img src="https://unavatar.io/youtube/SaxonMapper" style="width:100%"></div>
                <span class="t-name">@Saxon Mapper</span>
                <div class="sub-count">1.76K Subscribers</div>
                <p class="t-text">"Cool site lol!"</p>
            </div>
        </div>
    </section>
</div>

<script>
    const canvas = document.getElementById('mainCanvas');
    const ctx = canvas.getContext('2d');
    const ants = document.getElementById('ants-svg');
    const upload = document.getElementById('upload');
    const downloadBtn = document.getElementById('download-btn');

    upload.onchange = (e) => {
        const reader = new FileReader();
        reader.onload = (event) => {
            const img = new Image();
            img.onload = () => {
                canvas.width = img.width;
                canvas.height = img.height;
                ctx.drawImage(img, 0, 0);
                ants.style.display = 'none'; // Replaced with logic from 2.7.7
                downloadBtn.style.display = 'block';
            };
            img.src = event.target.result;
        };
        reader.readAsDataURL(e.target.files[0]);
    };

    downloadBtn.onclick = () => {
        const link = document.createElement('a');
        link.download = 'mapify-export.png';
        link.href = canvas.toDataURL();
        link.click();
    };
</script>
</body>
</html>
