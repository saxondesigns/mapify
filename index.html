<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapify</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@400;600;700&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --primary: #00ca4e;
            --apple-bg: #000000;
            --apple-card: #1c1c1e;
            --apple-text: #ffffff;
            --apple-secondary: #8e8e93;
            --apple-border: rgba(255, 255, 255, 0.1);
            --gold: #ffcc00;
        }

        html { scroll-behavior: smooth; }

        body { 
            font-family: 'SF Pro Display', 'Poppins', sans-serif; 
            background: var(--apple-bg); 
            background-image: radial-gradient(circle at 50% 50%, rgba(0, 202, 78, 0.08) 0%, transparent 50%);
            color: var(--apple-text); 
            margin: 0; 
            display: flex; 
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        #main-wrapper { 
            width: 100%;
            max-width: 1200px;
            padding: 80px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .container { 
            background: rgba(28, 28, 30, 0.7); backdrop-filter: blur(20px); padding: 3rem; 
            border-radius: 32px; border: 1px solid var(--apple-border); 
            width: 100%; max-width: 800px; margin-bottom: 80px;
        }

        h1 { font-size: 4rem; letter-spacing: -2px; font-weight: 800; margin: 0; }
        .tagline { color: var(--apple-secondary); margin-bottom: 2rem; }

        /* Centered Controls */
        .controls { display: flex; flex-direction: column; align-items: center; gap: 20px; width: 100%; }
        
        .search-container { width: 100%; max-width: 450px; position: relative; margin: 0 auto; }
        #preset-display { 
            display: flex; align-items: center; justify-content: center; gap: 12px; 
            padding: 15px; border-radius: 16px; border: 1px solid var(--apple-border); 
            background: rgba(44, 44, 46, 0.8); cursor: pointer; font-weight: 600;
        }

        #results-box { 
            position: absolute; top: 100%; left: 0; right: 0; background: #2c2c2e; 
            border: 1px solid var(--apple-border); border-radius: 16px; z-index: 1001; display: none;
        }

        /* Centered Flags Search */
        .flag-section { width: 100%; max-width: 600px; margin: 0 auto 100px; position: relative; }
        .flag-search-bar { 
            width: 100%; padding: 20px; border-radius: 20px; background: #1c1c1e; 
            border: 1px solid var(--apple-border); color: white; text-align: center; font-size: 1.1rem;
        }
        #flag-results { 
            position: absolute; width: 100%; background: #2c2c2e; border-radius: 15px; 
            top: 75px; z-index: 500; display: none; max-height: 300px; overflow-y: auto;
        }

        /* Review Grid */
        .testimonials-grid { 
            display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); 
            gap: 20px; width: 100%; margin-bottom: 50px;
        }
        .testimonial-card { 
            background: rgba(28, 28, 30, 0.5); padding: 25px; border-radius: 24px; 
            border: 1px solid var(--apple-border); text-align: left; position: relative;
        }

        /* Admin Delete Button - Hidden by default */
        .admin-del {
            display: none; position: absolute; top: 10px; right: 10px; 
            background: #ff4545; color: white; border: none; padding: 5px 10px; 
            border-radius: 6px; font-size: 0.7rem; cursor: pointer; font-weight: 700;
        }

        /* Form at Bottom */
        .review-form { 
            background: rgba(28, 28, 30, 0.8); border: 1px solid var(--apple-border); 
            padding: 30px; border-radius: 24px; width: 100%; max-width: 500px; 
        }

        canvas { max-width: 100%; border-radius: 14px; margin-top: 20px; }
        .submit-btn { background: var(--primary); color: white; border: none; padding: 15px; width: 100%; border-radius: 12px; cursor: pointer; font-weight: 700; }
    </style>
</head>
<body>

<div id="main-wrapper">
    <div class="container">
        <h1>Mapify</h1>
        <p class="tagline">The Geotuber's Choice</p>
        
        <div class="controls">
            <div class="search-container">
                <div id="preset-display">Choose Style Preset</div>
                <div id="results-box"></div>
            </div>
            <input type="file" id="upload" style="display:none">
            <button onclick="document.getElementById('upload').click()" style="border:1px solid var(--primary); color:var(--primary); background:none; padding:10px 20px; border-radius:10px; cursor:pointer;">Upload Base Map</button>
        </div>
        <canvas id="mainCanvas"></canvas>
    </div>

    <!-- Centered Flag Search -->
    <div id="flags-anchor"></div>
    <section class="flag-section">
        <h2 style="font-size: 2.5rem; margin-bottom: 20px;">Global Assets</h2>
        <input type="text" id="flag-search" class="flag-search-bar" placeholder="Search for a country...">
        <div id="flag-results"></div>
    </section>

    <!-- Reviews Grid -->
    <section style="width:100%">
        <h2 style="font-size: 2.5rem; margin-bottom: 40px;">Community Reviews</h2>
        <div class="testimonials-grid" id="reviews-list">
            <!-- Loaded via JS -->
        </div>

        <div style="display:flex; justify-content:center; width:100%; margin-top: 50px;">
            <div class="review-form">
                <h3>Leave a Review</h3>
                <input type="text" id="rev-name" placeholder="@YouTubeHandle" style="width:100%; padding:12px; margin-bottom:10px; background:#000; border:1px solid #333; color:white; border-radius:8px;">
                <textarea id="rev-text" placeholder="Your thoughts..." style="width:100%; padding:12px; margin-bottom:10px; background:#000; border:1px solid #333; color:white; border-radius:8px;"></textarea>
                <button class="submit-btn" id="submit-btn" onclick="submitReview()">Post Review</button>
            </div>
        </div>
    </section>
</div>

<script>
    const reviewsList = document.getElementById('reviews-list');
    const flagSearch = document.getElementById('flag-search');
    const flagResults = document.getElementById('flag-results');
    const canvas = document.getElementById('mainCanvas');
    const ctx = canvas.getContext('2d');
    let isAdmin = false;

    // --- ADMIN COMMAND ---
    // Type SaxonAdmin() in your console to enable deleting reviews!
    window.SaxonAdmin = function() {
        isAdmin = true;
        document.querySelectorAll('.admin-del').forEach(btn => btn.style.display = 'block');
        console.log("%c Admin Mode Enabled. Go hard! ", "background: #00ca4e; color: #fff; font-weight: bold;");
    };

    const defaultReviews = [
        { name: "@ImThatAustrian-Empire", text: "Very Useful", handle: "ImThat-AustrianEmpire", subs: "152K" },
        { name: "@Empire Editz", text: "It is actually so helpful for beginners.", handle: "UC4RgBJffMZ1mlPuLQ_R_B4g", subs: "10K" },
        { name: "@Geographic Edits", text: "Definitely save me a lot of time!", handle: "UCc2olH4OKeHMNllPIJHWcSQ", subs: "7.5K" },
        { name: "@Saxon Mapper", text: "Cool site lol!", handle: "SaxonMapper", subs: "1.76K" }
    ];

    function renderReviews() {
        reviewsList.innerHTML = '';
        defaultReviews.forEach((r, index) => {
            const card = document.createElement('div');
            card.className = 'testimonial-card';
            card.innerHTML = `
                <button class="admin-del" style="display:${isAdmin ? 'block' : 'none'}" onclick="removeReview(${index})">Delete</button>
                <img src="https://unavatar.io/youtube/${r.handle}" style="width:50px; border-radius:50%; margin-bottom:10px">
                <div style="font-weight:bold">${r.name}</div>
                <div style="font-size:0.7rem; color:var(--primary)">${r.subs || 'Member'}</div>
                <p style="font-style:italic">"${r.text}"</p>
            `;
            reviewsList.appendChild(card);
        });
    }

    function removeReview(index) {
        defaultReviews.splice(index, 1);
        renderReviews();
    }

    function submitReview() {
        if(localStorage.getItem('mapify_posted')) { alert("One post per session!"); return; }
        const name = document.getElementById('rev-name').value;
        const text = document.getElementById('rev-text').value;
        if(!name || !text) return;
        defaultReviews.unshift({ name: name, text: text, handle: name.replace('@',''), subs: 'Community' });
        localStorage.setItem('mapify_posted', 'true');
        renderReviews();
    }

    async function initFlags() {
        const res = await fetch('https://flagcdn.com/en/codes.json');
        const codes = await res.json();
        flagSearch.oninput = () => {
            const val = flagSearch.value.toLowerCase();
            flagResults.innerHTML = '';
            if(!val) { flagResults.style.display = 'none'; return; }
            Object.entries(codes).filter(([c, n]) => n.toLowerCase().includes(val)).slice(0, 8).forEach(([code, name]) => {
                const div = document.createElement('div');
                div.style.padding = "12px"; div.style.cursor = "pointer";
                div.innerHTML = `<img src="https://flagcdn.com/w40/${code}.png" style="margin-right:10px"> ${name}`;
                div.onclick = () => {
                    const img = new Image(); img.crossOrigin = "anonymous";
                    img.onload = () => { canvas.width = img.width; canvas.height = img.height; ctx.drawImage(img, 0, 0); };
                    img.src = `https://flagcdn.com/w640/${code}.png`;
                    flagResults.style.display = 'none';
                    flagSearch.value = name;
                };
                flagResults.appendChild(div);
            });
            flagResults.style.display = 'block';
        };
    }

    initFlags();
    renderReviews();
</script>
</body>
</html>
