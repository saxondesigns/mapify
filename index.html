<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapify</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #00ca4e;
            --bg-dark: #121212;
            --panel-dark: #1e1e1e;
            --sidebar-width: 240px;
        }

        body { 
            font-family: 'Poppins', sans-serif; 
            background: var(--bg-dark); 
            color: #e0e0e0; 
            margin: 0; 
            display: flex;
            min-height: 100vh;
            overflow-x: hidden;
        }

        #sidebar {
            width: var(--sidebar-width);
            background: var(--panel-dark);
            border-right: 1px solid #333;
            display: flex;
            flex-direction: column;
            padding: 30px 20px;
            box-sizing: border-box;
        }

        .sidebar-header { font-size: 1.8rem; color: var(--primary); margin-bottom: 2.5rem; letter-spacing: -1px; }

        .nav-link {
            display: flex; align-items: center; padding: 12px 15px; color: #ccc;
            text-decoration: none; border-radius: 8px; transition: 0.2s;
            margin-bottom: 15px; background: #262626; font-size: 0.95rem; gap: 12px;
        }

        .nav-link:hover { background: #333; color: var(--primary); transform: translateX(5px); }
        .fa-youtube { color: #ff0000; }
        .fa-discord { color: #5865F2; }

        #main-content { flex-grow: 1; display: flex; align-items: center; justify-content: center; padding: 40px; }

        .container { 
            background: var(--panel-dark); padding: 2.5rem; border-radius: 16px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.6); max-width: 850px; width: 100%; 
            text-align: center; border: 1px solid #333; 
        }

        h1 { color: var(--primary); margin-bottom: 0.5rem; font-size: 3rem; letter-spacing: -1px; }
        
        .controls { margin-bottom: 2rem; display: flex; flex-direction: column; align-items: center; gap: 15px; }
        
        .search-container { position: relative; width: 100%; max-width: 400px; }
        #wiki-search { width: 100%; padding: 14px; border-radius: 8px; border: 1px solid #444; background: #2d2d2d; color: white; box-sizing: border-box; font-size: 1rem; }
        
        #search-results { 
            position: absolute; top: 100%; left: 0; right: 0; 
            background: #2d2d2d; border: 1px solid #444; border-radius: 0 0 8px 8px; 
            max-height: 300px; overflow-y: auto; z-index: 999; display: none;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        .result-item { 
            display: flex; align-items: center; padding: 10px 15px; 
            cursor: pointer; text-align: left; border-bottom: 1px solid #333; 
            gap: 15px; transition: 0.1s;
        }
        .result-item:hover { background: #3d3d3d; }
        .result-item img { width: 30px; height: 20px; object-fit: cover; border: 1px solid #555; border-radius: 0; }
        .result-item span { font-size: 0.95rem; font-weight: bold; }

        #canvas-container { 
            margin-top: 10px; border-radius: 12px; background-color: #1a1a1a; 
            display: inline-block; position: relative;
            background-image: linear-gradient(to right, #444 50%, transparent 50%), 
                              linear-gradient(to right, #444 50%, transparent 50%), 
                              linear-gradient(to bottom, #444 50%, transparent 50%), 
                              linear-gradient(to bottom, #444 50%, transparent 50%);
            background-position: 0 0, 0 100%, 0 0, 100% 0; background-repeat: repeat-x, repeat-x, repeat-y, repeat-y;
            background-size: 15px 2px, 15px 2px, 2px 15px, 2px 15px; animation: border-dance 0.4s infinite linear;
        }

        @keyframes border-dance {
            0% { background-position: 0 0, 15px 100%, 0 15px, 100% 0; }
            100% { background-position: 15px 0, 0 100%, 0 0, 100% 15px; }
        }

        #canvas-container.loaded { animation: none; background-image: none; border: 2px solid transparent; }
        canvas { max-width: 100%; height: auto; display: block; }
        
        button#download-btn { background: var(--primary); border: none; padding: 14px 28px; color: white; cursor: pointer; border-radius: 8px; font-weight: bold; font-size: 1.1rem; margin-top: 2rem; display: none; }

        .version-tag {
            position: fixed; bottom: 15px; right: 20px;
            font-size: 0.75rem; color: rgba(255, 255, 255, 0.3);
            pointer-events: none;
        }
    </style>
</head>
<body>

<aside id="sidebar">
    <div class="sidebar-header">Mapify</div>
    <a href="https://discord.gg/kdFCt93SWe" target="_blank" class="nav-link"><i class="fab fa-discord"></i> Discord</a>
    <a href="https://youtube.com/@SaxonMapper" target="_blank" class="nav-link"><i class="fab fa-youtube"></i> YouTube</a>
</aside>

<main id="main-content">
    <div class="container">
        <h1>Mapify</h1>
        <p style="color: #aaa; margin-bottom: 20px;">Standardized Flag Maps for Mappers</p>
        <div class="controls">
            <div class="search-container">
                <input type="text" id="wiki-search" placeholder="Search country (e.g. Palestine, Kosovo, Taiwan)...">
                <div id="search-results"></div>
            </div>
            <input type="file" id="upload" accept="image/*" style="display:none">
            <button onclick="document.getElementById('upload').click()" style="background: #333; color: #fff; border: 1px solid #444; padding: 10px 20px; border-radius: 8px; cursor: pointer;">Or Upload Custom File</button>
        </div>
        <div id="canvas-container">
            <canvas id="mainCanvas"></canvas>
        </div>
        <br>
        <button id="download-btn">Download Final Map</button>
    </div>
</main>

<div class="version-tag">Mapify v2.4.2 (Stable API)</div>

<script>
    const searchInput = document.getElementById('wiki-search');
    const searchResults = document.getElementById('search-results');
    const canvas = document.getElementById('mainCanvas');
    const ctx = canvas.getContext('2d');
    const downloadBtn = document.getElementById('download-btn');
    const canvasContainer = document.getElementById('canvas-container');
    const texture = new Image();
    texture.src = 'grunge.png';

    let countryData = [];

    // 1. Fetch official list with square flags for the menu
    async function init() {
        try {
            const res = await fetch('https://restcountries.com/v3.1/all?fields=name,cca2,flags');
            const data = await res.json();
            // Sort alphabetically for easier searching
            countryData = data.sort((a, b) => a.name.common.localeCompare(b.name.common));
        } catch (e) {
            console.error("API failed to load list.");
        }
    }

    searchInput.addEventListener('input', () => {
        const val = searchInput.value.toLowerCase();
        searchResults.innerHTML = '';
        if (!val) { searchResults.style.display = 'none'; return; }

        const filtered = countryData.filter(c => 
            c.name.common.toLowerCase().includes(val) || 
            (c.cca2 && c.cca2.toLowerCase() === val)
        );

        filtered.forEach(c => {
            const div = document.createElement('div');
            div.className = 'result-item';
            div.innerHTML = `
                <img src="${c.flags.png}" alt="flag">
                <span>${c.name.common}</span>
            `;
            div.onclick = () => fetchFlagMap(c.name.common, c.cca2);
            searchResults.appendChild(div);
        });
        searchResults.style.display = filtered.length ? 'block' : 'none';
    });

    async function fetchFlagMap(name, code) {
        searchResults.style.display = 'none';
        searchInput.value = name;
        
        // Using a high-res flag map provider that uses ISO codes (cca2)
        const lowerCode = code.toLowerCase();
        
        // Dedicated Flag-Map URL (Handles all modern countries including Kosovo (xk), Palestine (ps), Taiwan (tw))
        const url = `https://raw.githubusercontent.com/the-mapping-network/flag-maps/main/assets/${lowerCode}.png`;

        const img = new Image();
        img.crossOrigin = "Anonymous";
        img.onload = () => processImage(img);
        img.onerror = () => {
            // Wikipedia Fallback for specific shapes
            const wikiUrl = `https://commons.wikimedia.org/wiki/Special:FilePath/Flag_map_of_${name.replace(/ /g, '_')}.svg?width=2000`;
            const fallback = new Image();
            fallback.crossOrigin = "Anonymous";
            fallback.onload = () => processImage(fallback);
            fallback.onerror = () => alert("Could not find a flag-map shape for this country. Please upload a shape manually.");
            fallback.src = wikiUrl;
        };
        img.src = url;
    }

    function processImage(img) {
        canvasContainer.classList.add('loaded');
        canvas.width = img.width;
        canvas.height = img.height;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        const tempCanvas = document.createElement('canvas');
        const tCtx = tempCanvas.getContext('2d');
        tempCanvas.width = img.width;
        tempCanvas.height = img.height;
        tCtx.drawImage(img, 0, 0);
        
        const imageData = tCtx.getImageData(0, 0, canvas.width, canvas.height);
        const pixels = imageData.data;
        const visited = new Uint8Array(canvas.width * canvas.height);
        const islands = [];

        for (let i = 0; i < pixels.length; i += 4) {
            const idx = i / 4;
            if (pixels[i + 3] > 10 && !visited[idx]) {
                const island = findIsland(idx, pixels, visited, canvas.width, canvas.height);
                if (island.pixels.length > 50) islands.push(island);
            }
        }

        // ORIGINAL LOGIC & SHADOW
        ctx.shadowBlur = 18;
        ctx.shadowOffsetX = 7.07;
        ctx.shadowOffsetY = 7.07;
        ctx.shadowColor = "rgba(0, 0, 0, 0.70)";
        ctx.drawImage(img, 0, 0);
        ctx.shadowColor = "transparent";

        islands.forEach(island => {
            ctx.save();
            const path = new Path2D();
            island.pixels.forEach(p => {
                const x = p % canvas.width;
                const y = Math.floor(p / canvas.width);
                path.rect(x, y, 1, 1);
            });
            ctx.clip(path);
            ctx.globalAlpha = 0.60;
            ctx.globalCompositeOperation = 'source-atop';
            ctx.drawImage(texture, island.minX, island.minY, island.maxX - island.minX, island.maxY - island.minY);
            ctx.restore();
        });

        downloadBtn.style.display = 'inline-block';
    }

    function findIsland(startIdx, pixels, visited, width, height) {
        const stack = [startIdx];
        const islandPixels = [];
        let minX = startIdx % width, maxX = minX;
        let minY = Math.floor(startIdx / width), maxY = minY;
        visited[startIdx] = 1;

        while (stack.length > 0) {
            const curr = stack.pop();
            islandPixels.push(curr);
            const x = curr % width, y = Math.floor(curr / width);
            minX = Math.min(minX, x); maxX = Math.max(maxX, x);
            minY = Math.min(minY, y); maxY = Math.max(maxY, y);
            const neighbors = [curr - 1, curr + 1, curr - width, curr + width];
            neighbors.forEach(n => {
                if (n >= 0 && n < visited.length && !visited[n] && pixels[n * 4 + 3] > 10) {
                    if (Math.abs((n % width) - x) <= 1) {
                        visited[n] = 1;
                        stack.push(n);
                    }
                }
            });
        }
        return { pixels: islandPixels, minX, maxX, minY, maxY };
    }

    init();
</script>
</body>
</html>
