<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapify</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #00ca4e;
            --bg-dark: #121212;
            --panel-dark: #1e1e1e;
            --sidebar-width: 240px;
            --discord-blue: #5865F2;
            --youtube-red: #FF0000;
        }

        body { font-family: 'Poppins', sans-serif; background: var(--bg-dark); color: #e0e0e0; margin: 0; display: flex; min-height: 100vh; }

        #sidebar { width: var(--sidebar-width); background: var(--panel-dark); border-right: 1px solid #333; display: flex; flex-direction: column; padding: 30px 20px; box-sizing: border-box; }
        .sidebar-header { font-size: 1.8rem; color: var(--primary); margin-bottom: 2.5rem; letter-spacing: -1px; }

        /* FIXED LIQUID FLOW ANIMATION */
        .nav-link { 
            display: flex; align-items: center; padding: 12px 15px; color: #ccc; text-decoration: none; border-radius: 8px; 
            margin-bottom: 15px; background: #262626; font-size: 0.95rem; gap: 12px;
            position: relative; overflow: hidden; border: 1px solid #333; z-index: 1; 
            transition: color 0.3s, border-color 0.3s;
        }

        .nav-link::before {
            content: "";
            position: absolute;
            top: 100%;
            left: -10%;
            width: 120%;
            height: 150%;
            transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            z-index: -1;
            transform: skewY(10deg);
        }

        .nav-link.discord:hover::before {
            top: -20%;
            background: var(--discord-blue);
            transform: skewY(0deg);
        }

        .nav-link.youtube:hover::before {
            top: -20%;
            background: var(--youtube-red);
            transform: skewY(0deg);
        }

        .nav-link:hover {
            color: white;
            border-color: rgba(255,255,255,0.3);
        }

        #main-content { flex-grow: 1; display: flex; align-items: center; justify-content: center; padding: 40px; }
        .container { background: var(--panel-dark); padding: 2.5rem; border-radius: 16px; box-shadow: 0 15px 35px rgba(0,0,0,0.6); max-width: 600px; width: 100%; text-align: center; border: 1px solid #333; }

        h1 { color: var(--primary); margin-bottom: 0.5rem; font-size: 3rem; letter-spacing: -1px; }
        
        .controls { margin-bottom: 2rem; display: flex; flex-direction: column; align-items: center; gap: 15px; }
        .search-container { position: relative; width: 100%; max-width: 400px; }
        
        #preset-display { 
            display: flex; align-items: center; gap: 12px; width: 100%; padding: 10px 14px; border-radius: 8px; 
            border: 1px solid #444; background: #2d2d2d; color: white; cursor: pointer; min-height: 52px;
        }
        #preset-display img { width: 32px; height: 32px; border: 1px solid #555; display: none; border-radius: 4px; }

        #results-box { 
            position: absolute; top: 100%; left: 0; right: 0; background: #2d2d2d; border: 1px solid #444; 
            border-radius: 0 0 8px 8px; max-height: 250px; overflow-y: auto; z-index: 100; display: none;
        }
        .channel-item { display: flex; align-items: center; padding: 12px; gap: 15px; border-bottom: 1px solid #333; cursor: pointer; }
        .channel-item:hover { background: #3d3d3d; }
        .channel-item img { width: 32px; height: 32px; border: 1px solid #555; border-radius: 50%; }

        /* MARCHING ANTS BORDER */
        #canvas-container { 
            margin-top: 10px; border-radius: 12px; background-color: #1a1a1a; display: inline-block; 
            position: relative; padding: 12px;
            background-image: linear-gradient(90deg, #444 50%, transparent 50%), linear-gradient(90deg, #444 50%, transparent 50%), linear-gradient(0deg, #444 50%, transparent 50%), linear-gradient(0deg, #444 50%, transparent 50%);
            background-repeat: repeat-x, repeat-x, repeat-y, repeat-y;
            background-size: 15px 3px, 15px 3px, 3px 15px, 3px 15px;
            background-position: 0 0, 0 100%, 0 0, 100% 0;
            animation: border-crawl 0.6s infinite linear;
        }
        
        @keyframes border-crawl {
            0% { background-position: 0 0, 0 100%, 0 0, 100% 0; }
            100% { background-position: 15px 0, -15px 100%, 0 -15px, 100% 15px; }
        }

        #canvas-container.loaded { background-image: none; padding: 0; }

        canvas { max-width: 100%; height: auto; display: block; border-radius: 8px; position: relative; z-index: 2; }
        button#download-btn { background: var(--primary); border: none; padding: 14px 28px; color: white; cursor: pointer; border-radius: 8px; font-weight: bold; margin-top: 2rem; display: none; }
        .version-tag { position: fixed; bottom: 15px; right: 20px; font-size: 0.75rem; color: rgba(255, 255, 255, 0.3); pointer-events: none; }
    </style>
</head>
<body>

<aside id="sidebar">
    <div class="sidebar-header">Mapify</div>
    <a href="https://discord.gg/kdFCt93SWe" target="_blank" class="nav-link discord"><i class="fab fa-discord"></i> Discord</a>
    <a href="https://youtube.com/@SaxonMapper" target="_blank" class="nav-link youtube"><i class="fab fa-youtube"></i> YouTube</a>
</aside>

<main id="main-content">
    <div class="container">
        <h1>Mapify</h1>
        <div class="controls">
            <div class="search-container">
                <div id="preset-display">
                    <img id="selected-logo" src="" alt="">
                    <span id="selected-name">Select mapper preset...</span>
                </div>
                <div id="results-box"></div>
            </div>
            <p style="font-size: 0.8rem; color: #666; margin: 0;">— OR —</p>
            <input type="file" id="upload" accept="image/*" style="background: #2d2d2d; padding: 12px; border-radius: 8px; border: 1px solid #444; color: white; width: 100%; max-width: 300px;">
        </div>
        <div id="canvas-container">
            <canvas id="mainCanvas"></canvas>
        </div>
        <button id="download-btn">Download Map</button>
    </div>
</main>

<div class="version-tag">Mapify v2.5.6</div>

<script>
    const presetDisplay = document.getElementById('preset-display');
    const selectedLogo = document.getElementById('selected-logo');
    const selectedName = document.getElementById('selected-name');
    const resultsBox = document.getElementById('results-box');
    const canvas = document.getElementById('mainCanvas');
    const ctx = canvas.getContext('2d');
    const downloadBtn = document.getElementById('download-btn');
    const canvasContainer = document.getElementById('canvas-container');

    let activeTexture = new Image();
    let shadowSettings = { blur: 18, ox: 7.07, oy: 7.07 };

    const presets = [
        { name: "ITAE", handle: "ImThat-AustrianEmpire", texture: "grunge.png", s: { blur: 18, ox: 7.07, oy: 7.07 } },
        { name: "Willdude", handle: "WILLDUDE1", texture: "grunge2.png", s: { blur: 18, ox: 7.07, oy: 7.07 } },
        { name: "KT", handle: "knowledgetech_21", texture: "grunge3.png", s: { blur: 18, ox: 5.66, oy: 5.66 } },
        { name: "ITBE", handle: "ImThat-BrazilanEmpire", texture: "grunge4.png", s: { blur: 18, ox: 7.07, oy: 7.07 } }
    ];

    presetDisplay.onclick = () => { resultsBox.style.display = resultsBox.style.display === 'block' ? 'none' : 'block'; };

    presets.forEach(p => {
        const logoUrl = `https://unavatar.io/youtube/${p.handle}`;
        const div = document.createElement('div');
        div.className = 'channel-item';
        div.innerHTML = `<img src="${logoUrl}"><span>${p.name}</span>`;
        div.onclick = () => {
            activeTexture.src = p.texture;
            shadowSettings = p.s;
            selectedLogo.src = logoUrl;
            selectedLogo.style.display = 'block';
            selectedName.innerText = p.name;
            resultsBox.style.display = 'none';
        };
        resultsBox.appendChild(div);
    });

    document.getElementById('upload').addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
            const img = new Image();
            img.onload = () => processImage(img);
            img.src = event.target.result;
        };
        reader.readAsDataURL(file);
    });

    function processImage(img) {
        canvasContainer.classList.add('loaded');
        canvas.width = img.width;
        canvas.height = img.height;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.shadowBlur = shadowSettings.blur;
        ctx.shadowOffsetX = shadowSettings.ox;
        ctx.shadowOffsetY = shadowSettings.oy;
        ctx.shadowColor = "rgba(0, 0, 0, 0.70)";
        ctx.drawImage(img, 0, 0);
        ctx.shadowColor = "transparent";
        ctx.save();
        ctx.globalAlpha = 0.60;
        ctx.globalCompositeOperation = 'source-atop';
        ctx.drawImage(activeTexture, 0, 0, canvas.width, canvas.height);
        ctx.restore();
        downloadBtn.style.display = 'inline-block';
    }

    window.onclick = (e) => { if (!presetDisplay.contains(e.target)) resultsBox.style.display = 'none'; };

    downloadBtn.onclick = () => {
        const link = document.createElement('a');
        link.download = `mapify_export.png`;
        link.href = canvas.toDataURL("image/png");
        link.click();
    };
</script>
</body>
</html>
