<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapify</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Poppins', 'Arial Bold', sans-serif; 
            background: #121212; 
            color: #e0e0e0; 
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            background: #1e1e1e;
            padding: 2.5rem;
            border-radius: 16px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            max-width: 800px;
            width: 100%;
            text-align: center;
            border: 1px solid #333;
        }
        h1 { 
            color: #00ca4e; 
            margin-bottom: 0.5rem; 
            margin-top: 0; 
            font-size: 3rem;
            letter-spacing: -1px;
        }
        p.subtitle { 
            font-family: sans-serif;
            color: #aaa; 
            margin-bottom: 2rem; 
            font-size: 0.9rem; 
            font-weight: normal;
        }
        .controls { margin-bottom: 2rem; display: flex; flex-direction: column; align-items: center; gap: 10px; }
        input[type="file"] {
            background: #2d2d2d;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #444;
            color: white;
            cursor: pointer;
            width: 100%;
            max-width: 300px;
            font-family: sans-serif;
        }
        #canvas-container { 
            margin-top: 10px; 
            border: 2px dashed #444; 
            border-radius: 12px;
            background-color: #1a1a1a;
            background-image: linear-gradient(45deg, #222 25%, transparent 25%), 
                              linear-gradient(-45deg, #222 25%, transparent 25%), 
                              linear-gradient(45deg, transparent 75%, #222 75%), 
                              linear-gradient(-45deg, transparent 75%, #222 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
            display: inline-block;
        }
        canvas { max-width: 100%; height: auto; display: block; }
        button#download-btn { 
            background: #00ca4e; 
            border: none; 
            padding: 14px 28px; 
            color: white; 
            cursor: pointer; 
            border-radius: 8px; 
            font-family: 'Poppins', sans-serif;
            font-weight: bold; 
            font-size: 1.1rem;
            margin-top: 2rem;
            display: none;
            transition: 0.2s;
        }
        button#download-btn:hover { background: #00ab42; transform: scale(1.05); }
    </style>
</head>
<body>

<div class="container">
    <h1>Mapify</h1>
    <p class="subtitle">Private browser-based map grungifier.</p>
    <div class="controls">
        <input type="file" id="upload" accept="image/*">
    </div>
    <div id="canvas-container">
        <canvas id="mainCanvas"></canvas>
    </div>
    <button id="download-btn">Download Map</button>
</div>

<canvas id="offscreenCanvas" style="display:none;"></canvas>

<script>
    const upload = document.getElementById('upload');
    const mainCanvas = document.getElementById('mainCanvas');
    const mainCtx = mainCanvas.getContext('2d');
    const offscreenCanvas = document.getElementById('offscreenCanvas');
    const offCtx = offscreenCanvas.getContext('2d');
    const downloadBtn = document.getElementById('download-btn');

    const texture = new Image();
    texture.src = 'grunge.png'; 

    upload.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = (event) => {
            const img = new Image();
            img.onload = () => {
                mainCanvas.width = img.width;
                mainCanvas.height = img.height;
                offscreenCanvas.width = img.width;
                offscreenCanvas.height = img.height;

                offCtx.clearRect(0, 0, offscreenCanvas.width, offscreenCanvas.height);
                offCtx.drawImage(img, 0, 0);
                offCtx.globalCompositeOperation = 'source-atop';
                offCtx.globalAlpha = 0.60;
                offCtx.drawImage(texture, 0, 0, offscreenCanvas.width, offscreenCanvas.height);
                offCtx.globalCompositeOperation = 'source-over';
                offCtx.globalAlpha = 1.0;

                mainCtx.clearRect(0, 0, mainCanvas.width, mainCanvas.height);
                mainCtx.shadowBlur = 18; 
                mainCtx.shadowOffsetX = 7.07; 
                mainCtx.shadowOffsetY = 7.07;
                mainCtx.shadowColor = "rgba(0, 0, 0, 0.70)";
                
                mainCtx.drawImage(offscreenCanvas, 0, 0);
                mainCtx.shadowColor = "transparent";
                downloadBtn.style.display = 'inline-block';
            };
            img.src = event.target.result;
        };
        reader.readAsDataURL(file);
    });

    downloadBtn.addEventListener('click', () => {
        const link = document.createElement('a');
        link.download = 'mapify_export.png';
        link.href = mainCanvas.toDataURL("image/png");
        link.click();
    });
</script>

</body>
</html>
