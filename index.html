<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapify</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@400;600;700&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --primary: #00ca4e;
            --verified-blue: #1d9bf0;
            --apple-bg: #000000;
            --apple-card: #1c1c1e;
            --apple-text: #ffffff;
            --apple-secondary: #8e8e93;
            --apple-border: rgba(255, 255, 255, 0.1);
        }

        body { 
            font-family: 'SF Pro Display', sans-serif; 
            background: var(--apple-bg); 
            color: var(--apple-text); 
            margin: 0; 
            display: flex; 
            min-height: 100vh;
        }

        /* Sidebar Styles */
        #sidebar { 
            width: 80px; background: rgba(28, 28, 30, 0.95); backdrop-filter: blur(20px);
            border-right: 1px solid var(--apple-border); display: flex; flex-direction: column; 
            align-items: center; padding: 30px 0; position: fixed; height: 100vh; z-index: 1000;
            transition: width 0.3s ease;
        }
        #sidebar:hover { width: 200px; }
        .nav-link { 
            display: flex; align-items: center; justify-content: center; width: 50px; height: 50px; 
            color: var(--apple-text); text-decoration: none; border-radius: 12px; margin-bottom: 15px;
            transition: all 0.2s; overflow: hidden; gap: 15px;
        }
        .nav-link span { display: none; white-space: nowrap; }
        #sidebar:hover .nav-link { width: 170px; justify-content: flex-start; padding-left: 15px; }
        #sidebar:hover .nav-link span { display: block; }
        .nav-link:hover { background: rgba(255, 255, 255, 0.1); color: var(--primary); }

        /* Main Layout */
        #main-wrapper { 
            margin-left: 80px; flex-grow: 1; padding: 60px 20px; 
            display: flex; flex-direction: column; align-items: center; width: calc(100% - 80px); 
        }
        .container { 
            background: var(--apple-card); padding: 40px; border-radius: 32px; 
            max-width: 900px; width: 100%; text-align: center; border: 1px solid var(--apple-border);
            box-sizing: border-box;
        }

        h1 { font-size: 3.5rem; margin-bottom: 10px; letter-spacing: -2px; }
        .tagline { color: var(--apple-secondary); margin-bottom: 40px; }

        /* Control Panel */
        .controls { display: flex; flex-direction: column; gap: 20px; width: 100%; }
        .search-container { position: relative; width: 100%; }
        #preset-display { 
            padding: 15px; border-radius: 16px; border: 1px solid var(--apple-border); 
            background: #2c2c2e; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        
        .shadow-box {
            background: rgba(255, 255, 255, 0.03); padding: 25px; border-radius: 20px;
            border: 1px solid var(--apple-border); text-align: left;
        }
        .shadow-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 15px; }
        .preset-hint { font-size: 0.8rem; color: var(--apple-secondary); font-weight: 600; text-transform: uppercase; }

        input[type=range] { width: 100%; accent-color: var(--primary); }
        
        /* Search Bars */
        .search-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; width: 100%; margin-top: 40px; }
        .flag-search-bar { 
            width: 100%; padding: 15px; border-radius: 14px; background: #1c1c1e; 
            border: 1px solid var(--apple-border); color: white; outline: none; box-sizing: border-box;
        }
        .results-dropdown { 
            position: absolute; background: #2c2c2e; width: 100%; border-radius: 12px; 
            z-index: 10; max-height: 200px; overflow-y: auto; display: none; text-align: left;
        }
        .result-item { padding: 12px; cursor: pointer; border-bottom: 1px solid var(--apple-border); display: flex; align-items: center; gap: 10px; }
        .result-item:hover { background: #3a3a3c; }

        canvas { background: #121212; border-radius: 20px; max-width: 100%; height: auto; margin-top: 30px; border: 1px solid var(--apple-border); }
        #download-btn { background: var(--primary); color: white; padding: 15px 30px; border-radius: 30px; border: none; font-weight: 700; cursor: pointer; margin-top: 20px; display: none; }
    </style>
</head>
<body>

<aside id="sidebar">
    <div style="font-size: 1.5rem; color: var(--primary); margin-bottom: 40px;"><i class="fa-solid fa-map"></i></div>
    <a href="#" class="nav-link"><i class="fa-solid fa-house"></i><span>Home</span></a>
    <a href="https://youtube.com/@SaxonMapper" class="nav-link"><i class="fa-brands fa-youtube"></i><span>YouTube</span></a>
    <a href="https://discord.gg/kdFCt93SWe" class="nav-link"><i class="fa-brands fa-discord"></i><span>Discord</span></a>
</aside>

<div id="main-wrapper">
    <div class="container">
        <h1>Mapify</h1>
        <p class="tagline">Professional flag maps in seconds.</p>

        <div class="controls">
            <!-- Presets -->
            <div class="search-container">
                <div id="preset-display">
                    <span id="selected-name">Choose Style Preset</span>
                </div>
                <div id="results-box" class="results-dropdown"></div>
            </div>

            <!-- Drop Shadow Pro -->
            <div class="shadow-box" id="shadow-settings">
                <label class="preset-hint" style="color: var(--primary);">Drop Shadow Pro</label>
                <div class="shadow-grid">
                    <div><label class="preset-hint">Blur</label><input type="range" id="ds-blur" min="0" max="100" value="18"></div>
                    <div><label class="preset-hint">Color</label><input type="color" id="ds-color" value="#000000" style="width:100%; height:30px; border:none; background:none;"></div>
                    <div><label class="preset-hint">Offset X</label><input type="range" id="ds-ox" min="-50" max="50" value="7"></div>
                    <div><label class="preset-hint">Offset Y</label><input type="range" id="ds-oy" min="-50" max="50" value="7"></div>
                </div>
            </div>

            <!-- Asset Search -->
            <div class="search-grid">
                <div style="position: relative;">
                    <label class="preset-hint">1. Pick a Flag</label>
                    <input type="text" id="flag-search" class="flag-search-bar" placeholder="Search flags...">
                    <div id="flag-results" class="results-dropdown"></div>
                </div>
                <div style="position: relative;">
                    <label class="preset-hint">2. Pick a Shape</label>
                    <input type="text" id="map-search" class="flag-search-bar" placeholder="Search border (Borderly)..." style="border-color: var(--verified-blue);">
                    <div id="map-results" class="results-dropdown"></div>
                </div>
            </div>
        </div>

        <canvas id="mainCanvas"></canvas>
        <button id="download-btn">Save Image</button>
    </div>
</div>
<script>
const canvas = document.getElementById('mainCanvas');
const ctx = canvas.getContext('2d');
const downloadBtn = document.getElementById('download-btn');
const flagSearch = document.getElementById('flag-search');
const flagResults = document.getElementById('flag-results');
const mapSearch = document.getElementById('map-search');
const mapResults = document.getElementById('map-results');
const presetDisplay = document.getElementById('preset-display');
const resultsBox = document.getElementById('results-box');

let currentBaseImage = null;
let activeTexture = new Image();
let allCountries = [];

// Fallback allCountries array if Borderly isn't fully initialized
fetch('https://restcountries.com/v3.1/all')
    .then(res => res.json())
    .then(data => {
        allCountries = data.map(c => ({ name: c.name.common, code: c.cca2 }));
    });

// Preset Selection Logic
presetDisplay.onclick = () => {
    resultsBox.style.display = resultsBox.style.display === 'block' ? 'none' : 'block';
};

// Flag Asset Search
flagSearch.oninput = () => {
    const query = flagSearch.value.toLowerCase();
    if (query.length < 2) { flagResults.style.display = 'none'; return; }
    flagResults.innerHTML = ''; flagResults.style.display = 'block';
    
    // Example list for flags
    const mockFlags = [
        { name: 'New Zealand', url: 'https://flagcdn.com/w320/nz.png' },
        { name: 'Australia', url: 'https://flagcdn.com/w320/au.png' },
        { name: 'Canada', url: 'https://flagcdn.com/w320/ca.png' },
        { name: 'United States', url: 'https://flagcdn.com/w320/us.png' }
    ];

    mockFlags.filter(f => f.name.toLowerCase().includes(query)).forEach(f => {
        const div = document.createElement('div');
        div.className = 'result-item';
        div.innerHTML = `<img src="${f.url}" width="24" height="16"/> <span>${f.name}</span>`;
        div.onclick = () => {
            flagSearch.value = f.name;
            flagResults.style.display = 'none';
            applyFlag(f.url);
        };
        flagResults.appendChild(div);
    });
};

// Borderly Map Search
mapSearch.oninput = () => {
    const query = mapSearch.value.toLowerCase();
    if (query.length < 2) { mapResults.style.display = 'none'; return; }
    mapResults.innerHTML = ''; mapResults.style.display = 'block';
    
    allCountries.filter(c => c.name.toLowerCase().includes(query)).slice(0, 5).forEach(c => {
        const div = document.createElement('div');
        div.className = 'result-item';
        div.innerHTML = `<i class="fa-solid fa-earth-americas" style="color: var(--verified-blue);"></i> <span>${c.name}</span>`;
        div.onclick = () => {
            mapSearch.value = c.name;
            mapResults.style.display = 'none';
            applyBorderlyMap(c.name);
        };
        mapResults.appendChild(div);
    });
};

// Apply Flag Image
function applyFlag(url) {
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.src = url;
    img.onload = () => {
        activeTexture = img;
        processImage(false);
    };
}

// Borderly SVG Fetch & Clipping
async function applyBorderlyMap(countryName) {
    const formatted = countryName.toLowerCase().replace(/\s+/g, '-');
    const borderImg = new Image();
    borderImg.crossOrigin = "anonymous";
    borderImg.src = `https://borderly.dev/${formatted}.svg`;

    borderImg.onload = () => {
        canvas.width = borderImg.width || 800;
        canvas.height = borderImg.height || 600;
        currentBaseImage = borderImg;
        processImage(false);
    };
    borderImg.onerror = () => {
        alert("Couldn't fetch the shape. Please try another country!");
    };
}

// Shadow Logic & Drawing
function processImage(scroll = true) {
    if (!currentBaseImage) return;

    const blur = document.getElementById('ds-blur').value;
    const color = document.getElementById('ds-color').value;
    const ox = parseInt(document.getElementById('ds-ox').value);
    const oy = parseInt(document.getElementById('ds-oy').value);

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Apply Shadows
    ctx.shadowBlur = parseInt(blur);
    ctx.shadowColor = color;
    ctx.shadowOffsetX = ox;
    ctx.shadowOffsetY = oy;

    // Draw the main border
    ctx.drawImage(currentBaseImage, 0, 0, canvas.width, canvas.height);

    // Reset shadow for clipping/texture
    ctx.shadowBlur = 0;
    ctx.shadowOffsetX = 0;
    ctx.shadowOffsetY = 0;

    ctx.globalCompositeOperation = 'source-in';
    
    // Fill the shape
    if (activeTexture.src) {
        ctx.drawImage(activeTexture, 0, 0, canvas.width, canvas.height);
    }
    
    ctx.globalCompositeOperation = 'source-over';
    downloadBtn.style.display = 'block';

    if (scroll) {
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }
}

// Live Update for all Range and Color sliders
document.querySelectorAll('#shadow-settings input').forEach(input => {
    input.addEventListener('input', () => {
        if (currentBaseImage) processImage(false);
    });
});

// Download Button
downloadBtn.onclick = () => {
    const link = document.createElement('a');
    link.download = 'mapify_map.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
};
</script>
</html>
