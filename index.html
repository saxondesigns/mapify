<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapify</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@400;600;700&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --primary: #00ca4e;
            --apple-bg: #000000;
            --apple-card: #1c1c1e;
            --apple-text: #ffffff;
            --apple-secondary: #8e8e93;
            --apple-border: rgba(255, 255, 255, 0.1);
            --gold: #ffcc00;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        html { scroll-behavior: smooth; }

        body { 
            font-family: 'SF Pro Display', 'Poppins', -apple-system, sans-serif; 
            background: var(--apple-bg); 
            background-image: 
                radial-gradient(circle at 50% 50%, rgba(0, 202, 78, 0.08) 0%, transparent 50%),
                linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 100% 100%, 50px 50px, 50px 50px;
            color: var(--apple-text); 
            margin: 0; 
            display: flex; 
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        /* Sidebar */
        #sidebar { 
            width: 80px; 
            background: rgba(28, 28, 30, 0.85); 
            backdrop-filter: blur(25px);
            border-right: 1px solid var(--apple-border); 
            display: flex; 
            flex-direction: column; 
            align-items: center;
            padding: 30px 0; 
            position: fixed; 
            height: 100vh; 
            z-index: 1000;
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        #sidebar:hover { width: 220px; }
        .sidebar-header { font-size: 1.5rem; color: var(--primary); margin-bottom: 3rem; }

        .nav-link { 
            display: flex; align-items: center; justify-content: center; width: 50px; height: 50px; 
            color: var(--apple-text); text-decoration: none; border-radius: 12px; 
            margin-bottom: 15px; background: transparent; font-size: 1.2rem; gap: 15px;
            transition: all 0.3s ease; overflow: hidden;
        }
        .nav-link span { display: none; font-size: 0.9rem; font-weight: 600; white-space: nowrap; }
        #sidebar:hover .nav-link { width: 180px; justify-content: flex-start; padding-left: 20px; }
        #sidebar:hover .nav-link span { display: block; }
        .nav-link:hover { background: rgba(255, 255, 255, 0.1); transform: scale(1.05); color: var(--primary); }

        /* Main Layout */
        #main-wrapper { 
            margin-left: 80px; 
            flex-grow: 1; 
            padding: 80px 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            width: calc(100% - 80px); 
        }
        
        .container { 
            background: rgba(28, 28, 30, 0.7); 
            backdrop-filter: blur(20px);
            padding: 4rem; 
            border-radius: 32px; 
            box-shadow: 0 30px 60px rgba(0,0,0,0.6); 
            max-width: 800px; 
            width: 100%; 
            text-align: center; 
            border: 1px solid var(--apple-border);
            margin-bottom: 120px; 
            animation: fadeInUp 0.8s ease-out;
        }

        h1 { color: var(--apple-text); margin-bottom: 10px; font-size: 4rem; letter-spacing: -2px; font-weight: 800; }
        .tagline { color: var(--apple-secondary); font-size: 1.2rem; font-weight: 500; margin-bottom: 3rem; }

        .controls { display: flex; flex-direction: column; align-items: center; gap: 25px; margin-bottom: 3rem; width: 100%; }
        .search-container { width: 100%; max-width: 450px; position: relative; }

        #preset-display { 
            display: flex; align-items: center; justify-content: center; gap: 12px; width: 100%; 
            padding: 15px; border-radius: 16px; border: 1px solid var(--apple-border); 
            background: rgba(44, 44, 46, 0.8); color: var(--apple-text); cursor: pointer; 
            min-height: 56px; font-weight: 600; transition: all 0.3s ease;
        }

        #results-box { 
            position: absolute; top: calc(100% + 10px); left: 0; right: 0; background: #2c2c2e; 
            border: 1px solid var(--apple-border); border-radius: 16px; box-shadow: 0 15px 40px rgba(0,0,0,0.5); 
            overflow: hidden; display: none; z-index: 1001;
        }
        
        .channel-item { display: flex; align-items: center; padding: 14px 20px; gap: 15px; cursor: pointer; border-bottom: 1px solid var(--apple-border); color: var(--apple-text); }
        .channel-item:hover { background: #3a3a3c; }

        #canvas-container { margin: 40px auto; border-radius: 24px; background: #121212; padding: 15px; box-shadow: 0 0 0 1px var(--apple-border); max-width: 90%; }
        canvas { border-radius: 14px; max-width: 100%; height: auto; display: block; margin: 0 auto; }
        
        button#download-btn { background: var(--primary); border: none; padding: 18px 40px; color: white; cursor: pointer; border-radius: 35px; font-weight: 700; display: none; margin: 20px auto 0; }

        /* REVIEW SYSTEM STYLES */
        .review-form {
            background: rgba(28, 28, 30, 0.8);
            border: 1px solid var(--apple-border);
            padding: 30px;
            border-radius: 24px;
            max-width: 600px;
            width: 100%;
            margin-bottom: 60px;
            text-align: left;
        }
        .star-rating { color: var(--apple-secondary); font-size: 1.5rem; margin-bottom: 15px; cursor: pointer; }
        .star-rating .fa-star.active { color: var(--gold); }
        
        .review-input, .name-input {
            width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--apple-border);
            padding: 15px; border-radius: 12px; color: white; font-family: inherit; margin-bottom: 15px; outline: none;
        }
        .review-input:focus { border-color: var(--primary); }
        
        .submit-review-btn {
            background: var(--apple-text); color: black; border: none; padding: 12px 25px;
            border-radius: 12px; font-weight: 700; cursor: pointer; transition: 0.3s;
        }
        .submit-review-btn:hover { background: var(--primary); color: white; }

        .testimonials-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 30px; width: 100%; padding: 0 20px; box-sizing: border-box; }
        .testimonial-card { background: rgba(28, 28, 30, 0.5); padding: 35px; border-radius: 28px; border: 1px solid var(--apple-border); text-align: left; transition: 0.3s; }
        .testimonial-card:hover { border-color: var(--primary); }
        .t-pfp-container { width: 60px; height: 60px; margin-bottom: 20px; border-radius: 50%; overflow: hidden; background: #333; display: flex; align-items: center; justify-content: center; font-weight: bold; color: var(--primary); }
        .stars-display { color: var(--gold); font-size: 0.8rem; margin-bottom: 5px; }

        .section-container { max-width: 1200px; width: 100%; text-align: center; margin-bottom: 120px; }
        .section-header { font-size: 3rem; color: var(--apple-text); margin-bottom: 40px; font-weight: 800; }
        .version-tag { position: fixed; bottom: 20px; right: 30px; font-size: 0.8rem; color: var(--apple-secondary); opacity: 0.6; }
    </style>
</head>
<body>

<aside id="sidebar">
    <div class="sidebar-header"><i class="fa-solid fa-map-location-dot"></i></div>
    <a href="https://discord.gg/kdFCt93SWe" target="_blank" class="nav-link"><i class="fa-brands fa-discord"></i><span>Discord</span></a>
    <a href="https://youtube.com/@SaxonMapper" target="_blank" class="nav-link"><i class="fa-brands fa-youtube"></i><span>YouTube</span></a>
    <a href="#flags-anchor" class="nav-link"><i class="fa-solid fa-flag"></i><span>Flags</span></a>
    <a href="#reviews-anchor" class="nav-link"><i class="fa-solid fa-star"></i><span>Reviews</span></a>
</aside>

<div id="main-wrapper">
    <div class="container">
        <h1>Mapify</h1>
        <p class="tagline">Professional flag maps in seconds.</p>
        <div class="controls">
            <div class="search-container">
                <span class="preset-hint">Select a preset from the top geotubers</span>
                <div id="preset-display">
                    <img id="selected-logo" src="" alt="" style="width:28px; height:28px; border-radius:50%; display:none;">
                    <span id="selected-name">Choose Style Preset</span>
                </div>
                <div id="results-box"></div>
            </div>
            <div style="margin-top: 10px;">
                <input type="file" id="upload" accept="image/*" style="display: none;">
                <label for="upload" style="cursor: pointer; color: var(--primary); font-weight: 700; font-size: 1.1rem;">
                    <i class="fa-solid fa-cloud-arrow-up" style="margin-right: 8px;"></i>Upload Base Map
                </label>
            </div>
        </div>
        <div id="canvas-container">
            <canvas id="mainCanvas"></canvas>
            <button id="download-btn">Save Image</button>
        </div>
    </div>

    <!-- Review Submission -->
    <div id="reviews-anchor"></div>
    <section class="section-container">
        <h2 class="section-header">Leave a Review</h2>
        <div style="display: flex; justify-content: center;">
            <div class="review-form">
                <div class="star-rating" id="star-input">
                    <i class="fa-solid fa-star" data-val="1"></i>
                    <i class="fa-solid fa-star" data-val="2"></i>
                    <i class="fa-solid fa-star" data-val="3"></i>
                    <i class="fa-solid fa-star" data-val="4"></i>
                    <i class="fa-solid fa-star" data-val="5"></i>
                </div>
                <input type="text" id="rev-name" class="name-input" placeholder="Your YouTube Handle (e.g. @User)">
                <textarea id="rev-text" class="review-input" rows="3" placeholder="How's the mapping today?"></textarea>
                <button class="submit-review-btn" onclick="submitReview()">Post Review</button>
            </div>
        </div>

        <div class="testimonials-grid" id="reviews-list">
            <!-- Initial Pre-loaded Reviews -->
            <div class="testimonial-card">
                <div class="stars-display"><i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i></div>
                <span class="t-name">@Saxon Mapper</span>
                <div class="sub-count">Verified Creator</div>
                <p class="t-text">"Cool site lol!"</p>
            </div>
        </div>
    </section>
</div>

<div class="version-tag">Mapify v2.8.0</div>

<script>
    // Star Rating Logic
    let currentRating = 0;
    const stars = document.querySelectorAll('#star-input i');
    stars.forEach(star => {
        star.onclick = () => {
            currentRating = star.dataset.val;
            stars.forEach(s => s.classList.toggle('active', s.dataset.val <= currentRating));
        };
    });

    // Moderation & Submission
    function submitReview() {
        const name = document.getElementById('rev-name').value;
        const text = document.getElementById('rev-text').value;
        const badWords = ['spam', 'badword1', 'badword2']; // Simple moderation list

        if (!name || !text || currentRating === 0) {
            alert("Fill in the blanks and rate it, mate!");
            return;
        }

        if (badWords.some(word => text.toLowerCase().includes(word))) {
            alert("Keep it clean! Your review contains moderated content.");
            return;
        }

        const list = document.getElementById('reviews-list');
        const card = document.createElement('div');
        card.className = 'testimonial-card';
        card.style.animation = 'fadeInUp 0.5s ease-out';
        
        let starsHtml = '';
        for(let i=0; i<5; i++) starsHtml += `<i class="fa-solid fa-star" style="color:${i < currentRating ? '#ffcc00' : '#8e8e93'}"></i>`;

        card.innerHTML = `
            <div class="stars-display">${starsHtml}</div>
            <span class="t-name">${name}</span>
            <div class="sub-count">Just Now</div>
            <p class="t-text">"${text}"</p>
        `;
        
        list.prepend(card);
        
        // Reset form
        document.getElementById('rev-name').value = '';
        document.getElementById('rev-text').value = '';
        currentRating = 0;
        stars.forEach(s => s.classList.remove('active'));
    }

    // --- RE-INTEGRATING YOUR PREVIOUS CORE LOGIC ---
    const presetDisplay = document.getElementById('preset-display');
    const resultsBox = document.getElementById('results-box');
    const canvas = document.getElementById('mainCanvas');
    const ctx = canvas.getContext('2d');
    const upload = document.getElementById('upload');
    const downloadBtn = document.getElementById('download-btn');

    const presets = [
        { name: "ITAE", handle: "ImThat-AustrianEmpire", texture: "grunge.png", s: { blur: 18, ox: 7.07, oy: 7.07 } },
        { name: "Willdude", handle: "WILLDUDE1", texture: "grunge2.png", s: { blur: 18, ox: 7.07, oy: 7.07 } }
    ];

    function initPresets() {
        presets.forEach(p => {
            const div = document.createElement('div');
            div.className = 'channel-item';
            div.innerHTML = `<img src="https://unavatar.io/youtube/${p.handle}" style="width:24px; border-radius:50%"><span>${p.name}</span>`;
            div.onclick = () => {
                document.getElementById('selected-name').innerText = p.name;
                resultsBox.style.display = 'none';
            };
            resultsBox.appendChild(div);
        });
    }

    presetDisplay.onclick = (e) => {
        e.stopPropagation();
        resultsBox.style.display = resultsBox.style.display === 'block' ? 'none' : 'block';
    };

    upload.onchange = (e) => {
        const reader = new FileReader();
        reader.onload = (event) => {
            const img = new Image();
            img.onload = () => {
                canvas.width = img.width;
                canvas.height = img.height;
                ctx.drawImage(img, 0, 0);
                downloadBtn.style.display = 'block';
            };
            img.src = event.target.result;
        };
        reader.readAsDataURL(e.target.files[0]);
    };

    initPresets();
</script>
</body>
</html>
