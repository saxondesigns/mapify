<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapify</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@400;600;700&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.cdnfonts.com/css/coolvetica" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --primary: #00ca4e;
            --apple-bg: #000000;
            --apple-card: #1c1c1e;
            --apple-text: #ffffff;
            --apple-secondary: #8e8e93;
            --apple-border: rgba(255, 255, 255, 0.1);
        }

        @font-face {
            font-family: 'CoolveticaItalic';
            src: local('Coolvetica Italic'), 
                 url('https://fonts.cdnfonts.com/s/14894/CoolveticaRg-Italic.woff') format('woff');
            font-display: swap;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        html { scroll-behavior: smooth; }

        body { 
            font-family: 'SF Pro Display', 'Poppins', -apple-system, sans-serif; 
            background: var(--apple-bg); 
            background-image: 
                radial-gradient(circle at 50% 50%, rgba(0, 202, 78, 0.08) 0%, transparent 50%),
                linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 100% 100%, 50px 50px, 50px 50px;
            color: var(--apple-text); 
            margin: 0; 
            display: flex; 
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        /* Sidebar */
        #sidebar { 
            width: 80px; background: rgba(28, 28, 30, 0.85); backdrop-filter: blur(25px);
            border-right: 1px solid var(--apple-border); display: flex; flex-direction: column; 
            align-items: center; padding: 30px 0; position: fixed; height: 100vh; z-index: 1000;
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        #sidebar:hover { width: 220px; }
        .sidebar-header { font-size: 1.5rem; color: var(--primary); margin-bottom: 3rem; }
        .nav-link { 
            display: flex; align-items: center; justify-content: center; width: 50px; height: 50px; 
            color: var(--apple-text); text-decoration: none; border-radius: 12px; 
            margin-bottom: 15px; background: transparent; font-size: 1.2rem; gap: 15px;
            transition: all 0.3s ease; overflow: hidden;
        }
        .nav-link span { display: none; font-size: 0.9rem; font-weight: 600; white-space: nowrap; }
        #sidebar:hover .nav-link { width: 180px; justify-content: flex-start; padding-left: 20px; }
        #sidebar:hover .nav-link span { display: block; }
        .nav-link:hover { background: rgba(255, 255, 255, 0.1); transform: scale(1.05); color: var(--primary); }

        /* Main Layout */
        #main-wrapper { margin-left: 80px; flex-grow: 1; padding: 80px 20px; display: flex; flex-direction: column; align-items: center; width: calc(100% - 80px); }
        .container { 
            background: rgba(28, 28, 30, 0.7); backdrop-filter: blur(20px);
            padding: 4rem; border-radius: 32px; box-shadow: 0 30px 60px rgba(0,0,0,0.6); 
            max-width: 800px; width: 100%; text-align: center; border: 1px solid var(--apple-border);
            margin-bottom: 120px; animation: fadeInUp 0.8s ease-out;
        }

        h1 { color: var(--apple-text); margin-bottom: 10px; font-size: 4rem; letter-spacing: -2px; font-weight: 800; }
        .tagline { color: var(--apple-secondary); font-size: 1.2rem; font-weight: 500; margin-bottom: 3rem; }

        input[type=range] { -webkit-appearance: none; background: var(--apple-border); height: 6px; border-radius: 5px; outline: none; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px; background: var(--primary); border-radius: 50%; cursor: pointer; transition: transform 0.1s; }
        
        .flag-search-bar { width: 100%; max-width: 600px; padding: 20px 30px; background: rgba(28, 28, 30, 0.8); border: 1px solid var(--apple-border); border-radius: 20px; color: var(--apple-text); font-family: inherit; outline: none; transition: all 0.3s; font-size: 1.1rem; text-align: center; box-sizing: border-box; }
        .flag-search-bar:focus { border-color: var(--primary); box-shadow: 0 0 20px rgba(0, 202, 78, 0.15); }

        #drop-zone:hover { border-color: var(--primary) !important; background: rgba(0, 202, 78, 0.05); }

        /* Testimonials */
        .testimonials-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 30px; width: 100%; padding: 0 20px; box-sizing: border-box; }
        .testimonial-card { background: rgba(28, 28, 30, 0.5); backdrop-filter: blur(15px); padding: 35px; border-radius: 28px; border: 1px solid var(--apple-border); transition: all 0.4s ease; text-align: left; }
        .testimonial-card:hover { transform: translateY(-10px); border-color: var(--primary); }
    </style>
</head>
<body>

<aside id="sidebar">
    <div class="sidebar-header"><i class="fa-solid fa-map-location-dot"></i></div>
    <a href="https://discord.gg/kdFCt93SWe" target="_blank" class="nav-link"><i class="fa-brands fa-discord"></i><span>Discord</span></a>
    <a href="https://youtube.com/@SaxonMapper" target="_blank" class="nav-link"><i class="fa-brands fa-youtube"></i><span>YouTube</span></a>
    <a href="#watermark-anchor" class="nav-link"><i class="fa-solid fa-video"></i><span>Watermark</span></a>
    <a href="#reviews-anchor" class="nav-link"><i class="fa-solid fa-star"></i><span>Reviews</span></a>
</aside>

<div id="main-wrapper">
    <!-- Mapify Section -->
    <div class="container">
        <h1>Mapify</h1>
        <p class="tagline">Professional flag maps in seconds.</p>
        <input type="file" id="upload" accept="image/*" style="display: none;">
        <label for="upload" style="cursor: pointer; color: var(--primary); font-weight: 700; font-size: 1.1rem;">
            <i class="fa-solid fa-cloud-arrow-up"></i> Upload Base Map
        </label>
        <div id="canvas-container" style="margin-top: 30px;">
            <canvas id="mainCanvas"></canvas>
        </div>
    </div>

    <!-- Watermark Lab -->
    <div id="watermark-anchor"></div>
    <section class="container" style="border-style: dashed; border-width: 2px; border-color: var(--apple-secondary);">
        <h2 style="font-size: 2.5rem; margin-bottom: 20px;">Watermark Lab</h2>
        
        <div id="drop-zone" style="padding: 60px; border: 2px dashed var(--apple-border); border-radius: 24px; cursor: pointer; transition: 0.3s;">
            <i class="fa-solid fa-video" style="font-size: 3rem; color: var(--primary); margin-bottom: 15px;"></i>
            <p style="color: var(--apple-secondary); font-weight: 500;">Drop video to watermark</p>
            <input type="file" id="video-upload" accept="video/*" style="display: none;">
        </div>

        <div id="watermark-controls" style="display: none; margin-top: 40px; text-align: left;">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                <div>
                    <label style="color: var(--apple-secondary); font-size: 0.8rem; margin-bottom: 8px; display: block;">TEXT</label>
                    <input type="text" id="wm-text" value="@SaxonMapper" class="flag-search-bar" style="padding: 12px; width: 100%; border-radius: 12px;">
                </div>
                <div>
                    <label style="color: var(--apple-secondary); font-size: 0.8rem; margin-bottom: 8px; display: block;">FONT</label>
                    <select id="font-select" class="flag-search-bar" style="padding: 12px; width: 100%; background: #1c1c1e; border-radius: 12px;">
                        <option value="'CoolveticaItalic', sans-serif">Coolvetica Italic</option>
                    </select>
                </div>
            </div>

            <div style="margin-top: 30px; display: grid; grid-template-columns: 1fr 1.5fr; gap: 40px;">
                <div>
                    <label style="color: var(--apple-secondary); font-size: 0.8rem; margin-bottom: 8px; display: block;">SIZE</label>
                    <input type="range" id="wm-size" min="10" max="300" value="80" style="width: 100%;">
                </div>
                <div>
                    <label style="color: var(--apple-secondary); font-size: 0.8rem; margin-bottom: 8px; display: block;">POSITION (X / Y)</label>
                    <div style="display: flex; gap: 15px;">
                        <input type="range" id="wm-x" min="0" max="100" value="90" style="flex: 1;">
                        <input type="range" id="wm-y" min="0" max="100" value="90" style="flex: 1;">
                    </div>
                </div>
            </div>

            <!-- Shadow Settings -->
            <div style="margin-top: 30px; padding: 25px; background: rgba(255,255,255,0.03); border-radius: 20px; border: 1px solid var(--apple-border);">
                <label style="color: var(--primary); font-weight: 700; font-size: 0.9rem;"><i class="fa-solid fa-moon"></i> SHADOW LAB</label>
                <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; margin-top: 20px;">
                    <div><label style="font-size: 0.7rem; color: var(--apple-secondary);">BLUR</label><input type="range" id="sh-blur" min="0" max="60" value="20" style="width: 100%;"></div>
                    <div><label style="font-size: 0.7rem; color: var(--apple-secondary);">OFFSET X</label><input type="range" id="sh-ox" min="-30" max="30" value="5" style="width: 100%;"></div>
                    <div><label style="font-size: 0.7rem; color: var(--apple-secondary);">OFFSET Y</label><input type="range" id="sh-oy" min="-30" max="30" value="5" style="width: 100%;"></div>
                </div>
            </div>

            <canvas id="wm-canvas" style="width: 100%; border-radius: 16px; margin-top: 30px; border: 1px solid var(--apple-border); background: #000;"></canvas>
            
            <button id="export-video" style="width: 100%; background: var(--primary); margin-top: 30px; height: 60px; border-radius: 16px; border: none; color: white; font-weight: 700; cursor: pointer;">
                <i class="fa-solid fa-download"></i> EXPORT WATERMARKED VIDEO
            </button>
        </div>
    </section>

    <!-- Reviews -->
    <div id="reviews-anchor"></div>
    <section class="section-container" style="width: 100%; margin-bottom: 120px;">
        <h2 style="font-size: 3rem; margin-bottom: 40px; text-align: center;">Community Verified</h2>
        <div class="testimonials-grid">
            <div class="testimonial-card">
                <span class="t-name">@Dzungar</span>
                <div style="color: var(--primary); font-size: 0.8rem; font-weight: 700; margin-bottom: 10px;">1.92K SUBS</div>
                <p style="font-style: italic; color: var(--apple-secondary);">"it's super useful xD!"</p>
            </div>
            <div class="testimonial-card">
                <span class="t-name">@Flipqy</span>
                <div style="color: var(--primary); font-size: 0.8rem; font-weight: 700; margin-bottom: 10px;">822 SUBS</div>
                <p style="font-style: italic; color: var(--apple-secondary);">"Wow..That's genius"</p>
            </div>
        </div>
    </section>
</div>

<script>
    const wmCanvas = document.getElementById('wm-canvas');
    const wmCtx = wmCanvas.getContext('2d');
    const videoUpload = document.getElementById('video-upload');
    const dropZone = document.getElementById('drop-zone');
    const wmControls = document.getElementById('watermark-controls');
    let currentVideo = null;

    // Load Local Fonts + Fallbacks
    async function loadFonts() {
        const select = document.getElementById('font-select');
        const basics = ["Arial", "Impact", "Verdana"];
        basics.forEach(f => { const o = document.createElement('option'); o.value = f; o.textContent = f; select.appendChild(o); });
        try { if ('queryLocalFonts' in window) { (await window.queryLocalFonts()).forEach(f => { const o = document.createElement('option'); o.value = f.family; o.textContent = f.fullName; select.appendChild(o); }); } } catch(e){}
    }
    loadFonts();

    dropZone.onclick = () => videoUpload.click();
    videoUpload.onchange = (e) => {
        const file = e.target.files[0];
        if (file) {
            const url = URL.createObjectURL(file);
            currentVideo = document.createElement('video');
            currentVideo.src = url;
            currentVideo.muted = true;
            currentVideo.loop = true;
            currentVideo.play();
            currentVideo.onloadedmetadata = () => {
                wmCanvas.width = currentVideo.videoWidth;
                wmCanvas.height = currentVideo.videoHeight;
                dropZone.style.display = 'none';
                wmControls.style.display = 'block';
                renderLoop();
            };
        }
    };

    function renderLoop() {
        wmCtx.globalCompositeOperation = 'source-over';
        wmCtx.drawImage(currentVideo, 0, 0, wmCanvas.width, wmCanvas.height);
        
        wmCtx.save();
        wmCtx.globalCompositeOperation = 'overlay';
        
        const text = document.getElementById('wm-text').value;
        const size = document.getElementById('wm-size').value;
        const font = document.getElementById('font-select').value;
        
        wmCtx.shadowBlur = document.getElementById('sh-blur').value;
        wmCtx.shadowOffsetX = document.getElementById('sh-ox').value;
        wmCtx.shadowOffsetY = document.getElementById('sh-oy').value;
        wmCtx.shadowColor = "rgba(0, 0, 0, 0.8)";

        wmCtx.font = `${size}px ${font}`;
        wmCtx.fillStyle = "rgba(255, 255, 255, 0.8)";
        wmCtx.textAlign = "center";
        
        const x = (wmCanvas.width * document.getElementById('wm-x').value) / 100;
        const y = (wmCanvas.height * document.getElementById('wm-y').value) / 100;
        
        wmCtx.fillText(text, x, y);
        wmCtx.restore();
        requestAnimationFrame(renderLoop);
    }
</script>
</body>
</html>
