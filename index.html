<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapify</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@400;600;700&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --primary: #00ca4e;
            --apple-bg: #000000;
            --apple-card: #1c1c1e;
            --apple-text: #ffffff;
            --apple-secondary: #8e8e93;
            --apple-border: rgba(255, 255, 255, 0.1);
        }

        @keyframes marching-ants {
            0% { stroke-dashoffset: 0; }
            100% { stroke-dashoffset: -20; }
        }

        html { scroll-behavior: smooth; }

        body { 
            font-family: 'SF Pro Display', 'Poppins', sans-serif; 
            background: var(--apple-bg); 
            background-image: 
                radial-gradient(circle at 50% 50%, rgba(0, 202, 78, 0.08) 0%, transparent 50%),
                linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 100% 100%, 50px 50px, 50px 50px;
            color: var(--apple-text); 
            margin: 0; 
            display: flex; 
            min-height: 100vh;
        }

        #sidebar { 
            width: 80px; 
            background: rgba(28, 28, 30, 0.85); 
            backdrop-filter: blur(25px);
            border-right: 1px solid var(--apple-border); 
            display: flex; 
            flex-direction: column; 
            align-items: center;
            padding: 30px 0; 
            position: fixed; 
            height: 100vh; 
            z-index: 1000;
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        #sidebar:hover { width: 220px; }
        .sidebar-header { font-size: 1.5rem; color: var(--primary); margin-bottom: 3rem; }

        .nav-link { 
            display: flex; align-items: center; justify-content: center; width: 50px; height: 50px; 
            color: var(--apple-text); text-decoration: none; border-radius: 12px; 
            margin-bottom: 15px; background: transparent; font-size: 1.2rem; gap: 15px;
            transition: all 0.3s ease; overflow: hidden;
        }
        .nav-link span { display: none; font-size: 0.9rem; font-weight: 600; white-space: nowrap; }
        #sidebar:hover .nav-link { width: 180px; justify-content: flex-start; padding-left: 20px; }
        #sidebar:hover .nav-link span { display: block; }
        .nav-link:hover { background: rgba(255, 255, 255, 0.1); color: var(--primary); }

        #main-wrapper { 
            margin-left: 80px; 
            flex-grow: 1; 
            padding: 80px 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            width: calc(100% - 80px); 
        }
        
        .container { 
            background: rgba(28, 28, 30, 0.7); 
            backdrop-filter: blur(20px);
            padding: 4rem; 
            border-radius: 32px; 
            max-width: 800px; 
            width: 100%; 
            text-align: center; 
            border: 1px solid var(--apple-border);
            margin-bottom: 100px; 
        }

        h1 { font-size: 4rem; letter-spacing: -2px; font-weight: 800; margin-bottom: 10px; }
        .tagline { color: var(--apple-secondary); margin-bottom: 3rem; }

        #preset-display { 
            display: flex; align-items: center; justify-content: center; gap: 12px; width: 100%; 
            padding: 15px; border-radius: 16px; border: 1px solid var(--apple-border); 
            background: rgba(44, 44, 46, 0.8); cursor: pointer; font-weight: 600;
        }

        /* Crawling Ants Container */
        #canvas-container { 
            margin: 40px auto; 
            position: relative;
            padding: 15px;
            border-radius: 24px;
            display: flex;
            justify-content: center;
        }

        .ants-border {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            fill: none;
            stroke: var(--primary);
            stroke-width: 3;
            stroke-dasharray: 10, 10;
            border-radius: 24px;
            animation: marching-ants 0.5s infinite linear;
            pointer-events: none;
        }

        .hidden { display: none; }

        canvas { border-radius: 14px; max-width: 100%; height: auto; z-index: 5; }

        #download-btn { 
            background: var(--primary); border: none; padding: 18px 40px; color: white; 
            cursor: pointer; border-radius: 35px; font-weight: 700; display: none; margin-top: 20px;
        }

        .testimonials-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 25px; width: 100%; }
        .testimonial-card { background: rgba(28, 28, 30, 0.5); padding: 30px; border-radius: 24px; border: 1px solid var(--apple-border); text-align: left; }
        .sub-count { color: var(--primary); font-weight: 700; font-size: 0.8rem; }
    </style>
</head>
<body>

<aside id="sidebar">
    <div class="sidebar-header"><i class="fa-solid fa-map-location-dot"></i></div>
    <a href="#" class="nav-link"><i class="fa-brands fa-discord"></i><span>Discord</span></a>
    <a href="#" class="nav-link"><i class="fa-brands fa-youtube"></i><span>YouTube</span></a>
    <a href="#flags-anchor" class="nav-link"><i class="fa-solid fa-flag"></i><span>Flags</span></a>
</aside>

<div id="main-wrapper">
    <div class="container">
        <h1>Mapify</h1>
        <p class="tagline">Professional flag maps in seconds.</p>
        
        <div class="search-container" style="position: relative; max-width: 450px; margin: 0 auto;">
            <span style="color: var(--apple-secondary); font-size: 0.85rem; margin-bottom: 8px; display: block;">Select a preset from the top geotubers</span>
            <div id="preset-display">Choose Style Preset</div>
            <div id="results-box" style="position: absolute; width: 100%; background: #2c2c2e; border-radius: 12px; display: none; z-index: 100;"></div>
        </div>

        <div id="canvas-container">
            <!-- The Crawling Ants SVG -->
            <svg class="ants-border" id="ants-svg">
                <rect x="0" y="0" width="100%" height="100%" rx="24" ry="24" />
            </svg>
            <canvas id="mainCanvas"></canvas>
        </div>

        <input type="file" id="upload" style="display:none">
        <label for="upload" style="color: var(--primary); font-weight: 700; cursor: pointer;">Upload Base Map</label>
        <br>
        <button id="download-btn">Save Image</button>
    </div>

    <div id="reviews-anchor"></div>
    <section class="testimonials-grid">
        <div class="testimonial-card">
            <span class="t-name">@ImThatAustrian-Empire</span>
            <div class="sub-count">152K SUBSCRIBERS</div>
            <p>"Very Useful"</p>
        </div>
        <div class="testimonial-card">
            <span class="t-name">@Saxon Mapper</span>
            <div class="sub-count">1.76K SUBSCRIBERS</div>
            <p>"Cool site lol!"</p>
        </div>
    </section>
</div>

<script>
    const canvas = document.getElementById('mainCanvas');
    const ctx = canvas.getContext('2d');
    const ants = document.getElementById('ants-svg');
    const downloadBtn = document.getElementById('download-btn');
    const upload = document.getElementById('upload');

    // Simple visual placeholder
    canvas.width = 600; canvas.height = 350;
    ctx.fillStyle = "#121212"; ctx.fillRect(0,0,600,350);

    upload.onchange = (e) => {
        const reader = new FileReader();
        reader.onload = (event) => {
            const img = new Image();
            img.onload = () => {
                canvas.width = img.width;
                canvas.height = img.height;
                ctx.drawImage(img, 0, 0);
                ants.classList.add('hidden'); // Kill the ants when image loads
                downloadBtn.style.display = 'inline-block';
            };
            img.src = event.target.result;
        };
        reader.readAsDataURL(e.target.files[0]);
    };

    downloadBtn.onclick = () => {
        const link = document.createElement('a');
        link.download = 'mapify.png';
        link.href = canvas.toDataURL();
        link.click();
    };
</script>
</body>
</html>
