<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapify</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@400;600;700&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --primary: #00ca4e;
            --apple-bg: #000000;
            --apple-card: #1c1c1e;
            --apple-text: #ffffff;
            --apple-secondary: #8e8e93;
            --apple-border: rgba(255, 255, 255, 0.1);
            --gold: #ffcc00;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        html { scroll-behavior: smooth; }

        body { 
            font-family: 'SF Pro Display', 'Poppins', -apple-system, sans-serif; 
            background: var(--apple-bg); 
            background-image: 
                radial-gradient(circle at 50% 50%, rgba(0, 202, 78, 0.08) 0%, transparent 50%),
                linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 100% 100%, 50px 50px, 50px 50px;
            color: var(--apple-text); 
            margin: 0; 
            display: flex; 
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        /* Sidebar */
        #sidebar { 
            width: 80px; 
            background: rgba(28, 28, 30, 0.85); 
            backdrop-filter: blur(25px);
            border-right: 1px solid var(--apple-border); 
            display: flex; 
            flex-direction: column; 
            align-items: center;
            padding: 30px 0; 
            position: fixed; 
            height: 100vh; 
            z-index: 1000;
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        #sidebar:hover { width: 220px; }
        .sidebar-header { font-size: 1.5rem; color: var(--primary); margin-bottom: 3rem; }

        .nav-link { 
            display: flex; align-items: center; justify-content: center; width: 50px; height: 50px; 
            color: var(--apple-text); text-decoration: none; border-radius: 12px; 
            margin-bottom: 15px; background: transparent; font-size: 1.2rem; gap: 15px;
            transition: all 0.3s ease; overflow: hidden;
        }
        .nav-link span { display: none; font-size: 0.9rem; font-weight: 600; white-space: nowrap; }
        #sidebar:hover .nav-link { width: 180px; justify-content: flex-start; padding-left: 20px; }
        #sidebar:hover .nav-link span { display: block; }
        .nav-link:hover { background: rgba(255, 255, 255, 0.1); transform: scale(1.05); color: var(--primary); }

        /* Main Layout */
        #main-wrapper { 
            margin-left: 80px; 
            flex-grow: 1; 
            padding: 80px 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            width: calc(100% - 80px); 
        }
        
        .container { 
            background: rgba(28, 28, 30, 0.7); 
            backdrop-filter: blur(20px);
            padding: 4rem; 
            border-radius: 32px; 
            box-shadow: 0 30px 60px rgba(0,0,0,0.6); 
            max-width: 800px; 
            width: 100%; 
            text-align: center; 
            border: 1px solid var(--apple-border);
            margin-bottom: 120px; 
            animation: fadeInUp 0.8s ease-out;
        }

        h1 { color: var(--apple-text); margin-bottom: 10px; font-size: 4rem; letter-spacing: -2px; font-weight: 800; }
        .tagline { color: var(--apple-secondary); font-size: 1.2rem; font-weight: 500; margin-bottom: 3rem; }

        /* Flags Search */
        .flag-search-bar {
            width: 100%; max-width: 600px; padding: 20px 30px;
            background: rgba(28, 28, 30, 0.8); border: 1px solid var(--apple-border); border-radius: 20px;
            color: var(--apple-text); font-family: inherit; outline: none;
            transition: all 0.3s; font-size: 1.1rem; text-align: center;
        }
        .flag-search-bar:focus { border-color: var(--primary); box-shadow: 0 0 20px rgba(0, 202, 78, 0.15); }

        /* Reviews Grid */
        .testimonials-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 30px; width: 100%; padding: 0 20px; box-sizing: border-box; }
        .testimonial-card { 
            background: rgba(28, 28, 30, 0.5); backdrop-filter: blur(15px); padding: 35px; border-radius: 28px; 
            border: 1px solid var(--apple-border); transition: all 0.4s ease; text-align: left;
        }
        .testimonial-card:hover { transform: translateY(-10px); border-color: var(--primary); background: rgba(35, 35, 38, 0.7); }
        .t-pfp-container { width: 60px; height: 60px; margin-bottom: 20px; border-radius: 50%; overflow: hidden; border: 2px solid var(--apple-border); }
        .t-name { font-weight: 700; font-size: 1.1rem; color: var(--apple-text); margin-bottom: 5px; display: block; }
        .sub-count { font-size: 0.8rem; color: var(--primary); margin-bottom: 15px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
        .t-text { font-size: 1rem; color: var(--apple-secondary); line-height: 1.6; margin: 0; font-style: italic; }
        .stars-display { color: var(--gold); font-size: 0.9rem; margin-bottom: 10px; }

        /* Review Form */
        .review-form {
            background: rgba(28, 28, 30, 0.8); border: 1px solid var(--apple-border);
            padding: 30px; border-radius: 24px; max-width: 600px; width: 100%;
            margin-bottom: 60px; text-align: left; animation: fadeInUp 1s ease;
        }
        .star-rating { color: var(--apple-secondary); font-size: 1.5rem; margin-bottom: 15px; cursor: pointer; }
        .star-rating .fa-star.active { color: var(--gold); }
        .review-input, .name-input {
            width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--apple-border);
            padding: 15px; border-radius: 12px; color: white; font-family: inherit; margin-bottom: 15px; outline: none; box-sizing: border-box;
        }
        .submit-review-btn { background: var(--primary); color: white; border: none; padding: 15px 30px; border-radius: 12px; font-weight: 700; cursor: pointer; transition: 0.3s; width: 100%; }

        #canvas-container { margin: 40px auto; border-radius: 24px; background: #121212; padding: 15px; box-shadow: 0 0 0 1px var(--apple-border); max-width: 90%; }
        canvas { border-radius: 14px; max-width: 100%; height: auto; display: block; margin: 0 auto; }
        
        button#download-btn { background: var(--primary); border: none; padding: 18px 40px; color: white; cursor: pointer; border-radius: 35px; font-weight: 700; display: none; margin: 20px auto 0; }

        .section-container { max-width: 1200px; width: 100%; text-align: center; margin-bottom: 120px; }
        .section-header { font-size: 3rem; color: var(--apple-text); margin-bottom: 40px; font-weight: 800; letter-spacing: -1px; }
        .version-tag { position: fixed; bottom: 20px; right: 30px; font-size: 0.8rem; color: var(--apple-secondary); opacity: 0.6; }
    </style>
</head>
<body>

<aside id="sidebar">
    <div class="sidebar-header"><i class="fa-solid fa-map-location-dot"></i></div>
    <a href="https://discord.gg/kdFCt93SWe" target="_blank" class="nav-link"><i class="fa-brands fa-discord"></i><span>Discord</span></a>
    <a href="https://youtube.com/@SaxonMapper" target="_blank" class="nav-link"><i class="fa-brands fa-youtube"></i><span>YouTube</span></a>
    <a href="#flags-anchor" class="nav-link"><i class="fa-solid fa-flag"></i><span>Flags</span></a>
    <a href="#reviews-anchor" class="nav-link"><i class="fa-solid fa-star"></i><span>Reviews</span></a>
</aside>

<div id="main-wrapper">
    <div class="container">
        <h1>Mapify</h1>
        <p class="tagline">Professional flag maps in seconds.</p>
        <div class="controls">
            <div style="margin-top: 10px;">
                <input type="file" id="upload" accept="image/*" style="display: none;">
                <label for="upload" style="cursor: pointer; color: var(--primary); font-weight: 700; font-size: 1.1rem;">
                    <i class="fa-solid fa-cloud-arrow-up" style="margin-right: 8px;"></i>Upload Base Map
                </label>
            </div>
        </div>
        <div id="canvas-container">
            <canvas id="mainCanvas"></canvas>
            <button id="download-btn">Save Image</button>
        </div>
    </div>

    <!-- Flags Section -->
    <div id="flags-anchor"></div>
    <section class="section-container">
        <h2 class="section-header">Global Assets</h2>
        <div style="display: flex; justify-content: center; width: 100%;">
            <div style="position: relative; width: 100%; max-width: 600px;">
                <input type="text" id="flag-search" class="flag-search-bar" placeholder="Search for any country flag...">
                <div id="flag-results" style="position: absolute; width: 100%; background: #2c2c2e; border-radius: 16px; top: calc(100% + 10px); z-index: 100; display: none; text-align: left;"></div>
            </div>
        </div>
    </section>

    <!-- Reviews Section -->
    <div id="reviews-anchor"></div>
    <section class="section-container">
        <h2 class="section-header">Community Reviews</h2>
        
        <!-- Leave a Review Form -->
        <div style="display: flex; justify-content: center;">
            <div class="review-form">
                <div class="star-rating" id="star-input">
                    <i class="fa-solid fa-star" data-val="1"></i>
                    <i class="fa-solid fa-star" data-val="2"></i>
                    <i class="fa-solid fa-star" data-val="3"></i>
                    <i class="fa-solid fa-star" data-val="4"></i>
                    <i class="fa-solid fa-star" data-val="5"></i>
                </div>
                <input type="text" id="rev-name" class="name-input" placeholder="YouTube Handle (e.g. @SaxonMapper)">
                <textarea id="rev-text" class="review-input" rows="3" placeholder="Write your review..."></textarea>
                <button class="submit-review-btn" onclick="submitReview()">Post to Mapify</button>
            </div>
        </div>

        <div class="testimonials-grid" id="reviews-list">
            <!-- Default Reviews -->
            <div class="testimonial-card">
                <div class="t-pfp-container"><img src="https://unavatar.io/youtube/SaxonMapper" style="width:100%"></div>
                <span class="t-name">@Saxon Mapper</span>
                <div class="sub-count">Developer</div>
                <p class="t-text">"Cool site lol!"</p>
            </div>
            <div class="testimonial-card">
                <div class="t-pfp-container"><img src="https://unavatar.io/youtube/ImThat-AustrianEmpire" style="width:100%"></div>
                <span class="t-name">@ImThatAustrian-Empire</span>
                <div class="sub-count">152K Subscribers</div>
                <p class="t-text">"Very Useful"</p>
            </div>
        </div>
    </section>
</div>

<div class="version-tag">Mapify v2.8.1</div>

<script>
    // Review logic
    let currentRating = 0;
    const stars = document.querySelectorAll('#star-input i');
    stars.forEach(star => {
        star.onclick = () => {
            currentRating = star.dataset.val;
            stars.forEach(s => s.classList.toggle('active', s.dataset.val <= currentRating));
        };
    });

    function submitReview() {
        const nameInput = document.getElementById('rev-name').value.trim();
        const text = document.getElementById('rev-text').value.trim();
        const handle = nameInput.startsWith('@') ? nameInput.substring(1) : nameInput;

        if (!handle || !text || currentRating === 0) {
            alert("Fill it all in first, mate!");
            return;
        }

        const list = document.getElementById('reviews-list');
        const card = document.createElement('div');
        card.className = 'testimonial-card';
        card.style.animation = 'fadeInUp 0.6s ease-out';
        
        let starsHtml = '';
        for(let i=0; i<5; i++) starsHtml += `<i class="fa-solid fa-star" style="color:${i < currentRating ? '#ffcc00' : '#8e8e93'}"></i>`;

        card.innerHTML = `
            <div class="t-pfp-container"><img src="https://unavatar.io/youtube/${handle}" onerror="this.src='https://cdn-icons-png.flaticon.com/512/149/149071.png'" style="width:100%"></div>
            <div class="stars-display">${starsHtml}</div>
            <span class="t-name">@${handle}</span>
            <div class="sub-count">Community Member</div>
            <p class="t-text">"${text}"</p>
        `;
        
        list.prepend(card);
        document.getElementById('rev-name').value = '';
        document.getElementById('rev-text').value = '';
        currentRating = 0;
        stars.forEach(s => s.classList.remove('active'));
    }

    // Flag logic
    const flagSearchInput = document.getElementById('flag-search');
    const flagResults = document.getElementById('flag-results');
    const canvas = document.getElementById('mainCanvas');
    const ctx = canvas.getContext('2d');
    const downloadBtn = document.getElementById('download-btn');
    let allCountries = [];

    async function initFlags() {
        try {
            const response = await fetch('https://flagcdn.com/en/codes.json');
            const data = await response.json();
            allCountries = Object.entries(data).map(([code, name]) => ({ name, code }));
        } catch (e) {}
    }

    flagSearchInput.oninput = () => {
        const query = flagSearchInput.value.toLowerCase();
        if (!query) { flagResults.style.display = 'none'; return; }
        const filtered = allCountries.filter(c => c.name.toLowerCase().includes(query)).slice(0, 8);
        flagResults.innerHTML = '';
        filtered.forEach(c => {
            const div = document.createElement('div');
            div.style.padding = "10px 20px";
            div.style.cursor = "pointer";
            div.style.color = "white";
            div.style.borderBottom = "1px solid rgba(255,255,255,0.1)";
            div.innerHTML = `<img src="https://flagcdn.com/w40/${c.code}.png" style="width:24px; margin-right:15px"><span>${c.name}</span>`;
            div.onclick = () => {
                const img = new Image();
                img.crossOrigin = "anonymous";
                img.onload = () => {
                    canvas.width = img.width;
                    canvas.height = img.height;
                    ctx.drawImage(img, 0, 0);
                    downloadBtn.style.display = 'block';
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                };
                img.src = `https://flagcdn.com/w640/${c.code}.png`;
                flagResults.style.display = 'none';
            };
            flagResults.appendChild(div);
        });
        flagResults.style.display = 'block';
    };

    document.getElementById('upload').onchange = (e) => {
        const reader = new FileReader();
        reader.onload = (event) => {
            const img = new Image();
            img.onload = () => {
                canvas.width = img.width;
                canvas.height = img.height;
                ctx.drawImage(img, 0, 0);
                downloadBtn.style.display = 'block';
            };
            img.src = event.target.result;
        };
        reader.readAsDataURL(e.target.files[0]);
    };

    downloadBtn.onclick = () => {
        const link = document.createElement('a');
        link.download = 'mapify-export.png';
        link.href = canvas.toDataURL();
        link.click();
    };

    initFlags();
</script>
</body>
</html>
